              <input type="text" placeholder="(813) 555-0000" value={newPhone} onChange={e=>setNewPhone(e.target.value)}/>
            </div>
            <div style={{marginBottom:"16px",background:"rgba(255,255,255,.04)",borderRadius:"8px",padding:"12px 14px"}}>
              <div style={{fontSize:"11px",color:"rgba(26,58,107,.65)",lineHeight:"1.7",marginBottom:"10px"}}>
                <strong>📱 SMS Consent (TCPA Compliance)</strong><br/>
                Staff must actively opt in to receive text notifications. Collect this consent in writing during onboarding.
              </div>
              <div onClick={()=>setNewSmsOptIn(!newSmsOptIn)} style={{display:"flex",gap:"10px",alignItems:"flex-start",cursor:"pointer"}}>
                <div style={{width:"16px",height:"16px",borderRadius:"4px",background:newSmsOptIn?"#27ae60":"rgba(255,255,255,.1)",border:`2px solid ${newSmsOptIn?"#27ae60":"rgba(255,255,255,.2)"}`,flexShrink:0,marginTop:"1px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px"}}>{newSmsOptIn&&"✓"}</div>
                <div style={{fontSize:"11px",color:"rgba(26,58,107,.7)",lineHeight:"1.5"}}>Staff member has signed written consent to receive SMS notifications from {facilityName} regarding inservice assignments and compliance reminders.</div>
              </div>
            </div>
            <div style={{display:"flex",gap:"8px"}}>
              <button className="btn" onClick={addStaff} style={{background:"#2563C0",color:"#1A3A6B",padding:"11px 20px",borderRadius:"7px",fontSize:"13px",flex:1}}>Add Member</button>
              <button className="btn" onClick={()=>setAddingStaff(false)} style={{background:"rgba(255,255,255,.07)",color:"rgba(26,58,107,.5)",padding:"11px 16px",borderRadius:"7px",fontSize:"13px"}}>Cancel</button>
            </div>
          </div>
        </div>
      )}

      {/* SETTINGS MODAL */}
      {editSettings&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setEditSettings(false)}>
          <div className="modal" style={{maxWidth:"400px"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"19px",color:"#2563C0",marginBottom:"18px"}}>⚙ Facility Settings</div>
            <div style={{marginBottom:"12px"}}><label style={{fontSize:"10px",color:"rgba(26,58,107,.45)",display:"block",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"1px"}}>Facility Name</label><input type="text" value={facilityName} onChange={e=>setFacilityName(e.target.value)}/></div>
            <div style={{marginBottom:"20px"}}><label style={{fontSize:"10px",color:"rgba(26,58,107,.45)",display:"block",marginBottom:"5px",textTransform:"uppercase",letterSpacing:"1px"}}>Director of Nursing</label><input type="text" value={donName} onChange={e=>setDonName(e.target.value)} placeholder="Name, credentials"/></div>
            <div className="reg-banner" style={{marginBottom:"18px"}}>Per 42 CFR §483.35, all in-service training must be under the <strong>general supervision of the DON</strong>. This name appears on all exported reports.</div>
            <button className="btn" onClick={async ()=>{ setEditSettings(false); try { await api("update_facility",{id:FACILITY_ID,name:facilityName,don_name:donName,twilio_sid:twilioSid,twilio_token:twilioToken,twilio_from:twilioFrom,sms_enabled:smsConfigured},"POST"); } catch(e){console.warn("Settings save failed",e.message);} }} style={{background:"#2563C0",color:"#1A3A6B",padding:"11px",borderRadius:"7px",fontSize:"13px",width:"100%"}}>Save & Close</button>
          </div>
        </div>
      )}
    </div>
  );

  // ── STAFF LOGIN (phone + PIN) ─────────────────────────────────────────────────
  if(mode==="staff-login") {
    const normalizePhone = (p) => p.replace(/\D/g,"");

    const handlePhoneSubmit = async () => {
      setStaffAuthError("");
      const digits = normalizePhone(staffPhoneInput);
      if(digits.length < 10) { setStaffAuthError("Please enter a valid phone number."); return; }
      try {
        // Try API first
        const fid = facilitySession?.id || 1;
        const res = await api("staff_phone_lookup", {phone: digits, facility_id: fid}, "POST");
        if(!res.ok) { setStaffAuthError(res.error || "Phone number not found. Contact your supervisor."); return; }
        setStaffAuthFound({id: res.staff_id, name: res.name, role: res.role});
        setStaffAuthStep(res.has_pin ? "enter-pin" : "set-pin");
      } catch(e) {
        // Offline fallback — check local staffRecords
        const found = staffRecords.find(s => normalizePhone(s.phone||"") === digits);
        if(!found) { setStaffAuthError("No staff account found with that phone number. Please contact your supervisor."); return; }
        setStaffAuthFound(found);
        setStaffAuthStep(found.pin ? "enter-pin" : "set-pin");
      }
    };

    const handleSetPin = async () => {
      setStaffAuthError("");
      if(staffPinInput.length !== 4 || !/^\d{4}$/.test(staffPinInput)) { setStaffAuthError("PIN must be exactly 4 digits."); return; }
      if(staffPinInput !== staffPinConfirm) { setStaffAuthError("PINs do not match. Try again."); return; }
      try {
        const fid = facilitySession?.id || 1;
        const res = await api("staff_set_pin", {staff_id: staffAuthFound.id, pin: staffPinInput, facility_id: fid}, "POST");
        if(!res.ok) { setStaffAuthError(res.error || "Could not save PIN."); return; }
        window.__svStaffToken = res.token;
        // Load full staff data
        await loadStaffData(res.token);
      } catch(e) {
        // Offline fallback
        setStaffRecords(prev => prev.map(s => s.id === staffAuthFound.id ? {...s, pin: staffPinInput} : s));
        loginStaffMember({...staffAuthFound, pin: staffPinInput});
      }
    };

    const handleEnterPin = async () => {
      setStaffAuthError("");
      try {
        const fid = facilitySession?.id || 1;
        const res = await api("staff_verify_pin", {staff_id: staffAuthFound.id, pin: staffPinInput, facility_id: fid}, "POST");
        if(!res.ok) { setStaffAuthError(res.error || "Incorrect PIN."); setStaffPinInput(""); return; }
        window.__svStaffToken = res.token;
        await loadStaffData(res.token);
      } catch(e) {
        // Offline fallback
        if(staffPinInput !== staffAuthFound.pin) { setStaffAuthError("Incorrect PIN. Please try again."); setStaffPinInput(""); return; }
        loginStaffMember(staffAuthFound);
      }
    };

    const loginStaffMember = (staffMember) => {
      setStaffName(staffMember.name);
      setStaffRecord(staffMember);
      setCompleted(staffMember.completions || {});
      setMode("staff");
    };

    const loadStaffData = async (token) => {
      try {
        // Temporarily set token so api() sends it
        const prevToken = window.__svToken;
        window.__svToken = token;
        const res = await api("staff_load_data", {}, "GET");
        window.__svToken = prevToken;
        if(res.ok && res.staff) {
          const s = res.staff;
          loginStaffMember({
            id: s.id, name: s.name, role: s.role,
            phone: s.phone, smsOptIn: !!s.sms_opt_in,
            pending: s.pending || [],
            completions: s.completions || {},
          });
          return;
        }
      } catch(e) { console.warn("loadStaffData failed, using local:", e.message); }
      // Fallback to local record
      loginStaffMember(staffAuthFound);
    };

    const PinDots = ({value}) => (
      <div style={{display:"flex",gap:"12px",justifyContent:"center",margin:"20px 0"}}>
        {[0,1,2,3].map(i=>(
          <div key={i} style={{width:"18px",height:"18px",borderRadius:"50%",
            background: i < value.length ? "#2563C0" : "rgba(255,255,255,.12)",
            border: "2px solid " + (i < value.length ? "#2563C0" : "rgba(255,255,255,.2)"),
            transition:"all .15s"}}/>
        ))}
      </div>
    );

    const Keypad = ({onPress}) => {
      const keys = ["1","2","3","4","5","6","7","8","9","","0","⌫"];
      return (
        <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:"10px",maxWidth:"260px",margin:"0 auto"}}>
          {keys.map((k,i)=>(
            <button key={i} onClick={()=>k&&onPress(k)} className="btn"
              style={{padding:"16px",fontSize:"20px",fontWeight:"600",justifyContent:"center",
                      background: k ? "rgba(255,255,255,.07)" : "transparent",
                      border: k ? "1px solid rgba(255,255,255,.12)" : "none",
                      borderRadius:"10px",color:"#1A3A6B",opacity:k?1:0,
                      cursor:k?"pointer":"default"}}>
              {k}
            </button>
          ))}
        </div>
      );
    };

    const handleKeypad = (key) => {
      if(key==="⌫") { setStaffPinInput(p=>p.slice(0,-1)); return; }
      if(staffPinInput.length < 4) setStaffPinInput(p=>p+key);
    };
    const handleKeypadConfirm = (key) => {
      if(key==="⌫") { setStaffPinConfirm(p=>p.slice(0,-1)); return; }
      if(staffPinConfirm.length < 4) setStaffPinConfirm(p=>p+key);
    };

    return (
      <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#dce8f5 0%,#e8f1fa 50%,#f0f6fc 100%)",
                   display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
        <style>{CSS}</style>
        {/* Brand */}
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:"900",color:"#2563C0"}}>SkillVia</div>
          <div style={{fontSize:"12px",color:"rgba(26,58,107,.35)",marginTop:"3px",letterSpacing:"1px",textTransform:"uppercase"}}>Staff Training Portal</div>
        </div>

        <div className="card" style={{width:"100%",maxWidth:"360px",padding:"28px",textAlign:"center"}}>

          {/* STEP 1 — Phone number */}
          {staffAuthStep==="phone"&&(
            <div>
              <div style={{fontSize:"32px",marginBottom:"10px"}}>📱</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#2563C0",marginBottom:"6px"}}>Welcome Back</div>
              <p style={{color:"rgba(26,58,107,.4)",fontSize:"12px",marginBottom:"22px",lineHeight:"1.6"}}>Enter your phone number to access your training portal.</p>
              <input type="tel" value={staffPhoneInput} onChange={e=>setStaffPhoneInput(e.target.value)}
                placeholder="(555) 000-0000" style={{fontSize:"16px",padding:"13px",textAlign:"center",letterSpacing:"2px",marginBottom:"14px"}}
                onKeyDown={e=>e.key==="Enter"&&handlePhoneSubmit()}/>
              {staffAuthError&&<div style={{background:"rgba(231,76,60,.12)",border:"1px solid rgba(231,76,60,.3)",borderRadius:"7px",padding:"9px 12px",fontSize:"12px",color:"#e74c3c",marginBottom:"12px"}}>{staffAuthError}</div>}
              <button className="btn" onClick={handlePhoneSubmit}
                style={{width:"100%",justifyContent:"center",background:"#2563C0",color:"white",padding:"13px",borderRadius:"8px",fontSize:"14px",fontWeight:"700"}}>
                Continue →
              </button>
            </div>
          )}

          {/* STEP 2 — Set PIN (first time) */}
          {staffAuthStep==="set-pin"&&(
            <div>
              <div style={{fontSize:"32px",marginBottom:"10px"}}>🔐</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#2563C0",marginBottom:"4px"}}>Hi, {staffAuthFound?.name?.split(" ")[0]}!</div>
              <p style={{color:"rgba(26,58,107,.4)",fontSize:"12px",marginBottom:"4px",lineHeight:"1.6"}}>First time here — set a 4-digit PIN to secure your account.</p>
              <div style={{fontSize:"11px",color:"rgba(26,58,107,.3)",marginBottom:"16px"}}>Choose PIN:</div>
              <PinDots value={staffPinInput}/>
              <Keypad onPress={handleKeypad}/>
              {staffPinInput.length===4&&(
                <div>
                  <div style={{fontSize:"11px",color:"rgba(26,58,107,.3)",margin:"16px 0 6px"}}>Confirm PIN:</div>
                  <PinDots value={staffPinConfirm}/>
                  <Keypad onPress={handleKeypadConfirm}/>
                </div>
              )}
              {staffAuthError&&<div style={{background:"rgba(231,76,60,.12)",border:"1px solid rgba(231,76,60,.3)",borderRadius:"7px",padding:"9px 12px",fontSize:"12px",color:"#e74c3c",margin:"12px 0"}}>{staffAuthError}</div>}
              {staffPinInput.length===4&&staffPinConfirm.length===4&&(
                <button className="btn" onClick={handleSetPin}
                  style={{width:"100%",justifyContent:"center",background:"#27ae60",color:"white",padding:"13px",borderRadius:"8px",fontSize:"14px",fontWeight:"700",marginTop:"14px"}}>
                  Set PIN & Enter Portal →
                </button>
              )}
              <button onClick={()=>{setStaffAuthStep("phone");setStaffPinInput("");setStaffPinConfirm("");setStaffAuthError("");}}
                style={{background:"none",border:"none",color:"rgba(26,58,107,.3)",fontSize:"12px",marginTop:"12px",cursor:"pointer",textDecoration:"underline"}}>
                ← Back
              </button>
            </div>
          )}

          {/* STEP 3 — Enter PIN (returning) */}
          {staffAuthStep==="enter-pin"&&(
            <div>
              <div style={{fontSize:"32px",marginBottom:"10px"}}>👋</div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"18px",color:"#2563C0",marginBottom:"4px"}}>Hi, {staffAuthFound?.name?.split(" ")[0]}!</div>
              <p style={{color:"rgba(26,58,107,.4)",fontSize:"12px",marginBottom:"4px",lineHeight:"1.6"}}>Enter your 4-digit PIN to continue.</p>
              <PinDots value={staffPinInput}/>
              <Keypad onPress={handleKeypad}/>
              {staffAuthError&&<div style={{background:"rgba(231,76,60,.12)",border:"1px solid rgba(231,76,60,.3)",borderRadius:"7px",padding:"9px 12px",fontSize:"12px",color:"#e74c3c",margin:"12px 0"}}>{staffAuthError}</div>}
              {staffPinInput.length===4&&(
                <button className="btn" onClick={handleEnterPin}
                  style={{width:"100%",justifyContent:"center",background:"#2563C0",color:"white",padding:"13px",borderRadius:"8px",fontSize:"14px",fontWeight:"700",marginTop:"14px"}}>
                  Enter Portal →
                </button>
              )}
              <button onClick={()=>{setStaffAuthStep("phone");setStaffPinInput("");setStaffAuthError("");}}
                style={{background:"none",border:"none",color:"rgba(26,58,107,.3)",fontSize:"12px",marginTop:"12px",cursor:"pointer",textDecoration:"underline"}}>
                ← Use different number
              </button>
            </div>
          )}

        </div>

        <div style={{marginTop:"20px",fontSize:"11px",color:"rgba(26,58,107,.2)",textAlign:"center"}}>
          Don't see your name? Contact your supervisor to be added to the system.
        </div>

      </div>
    );
  }

    // ── STAFF PORTAL ─────────────────────────────────────────────────────────────
  const TOPBAR = (
    <div style={{background:"rgba(0,0,0,.42)",borderBottom:"1px solid rgba(255,255,255,.09)",padding:"13px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"8px"}}>
      <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
        {(staffScreen==="topic"||staffScreen==="policy")&&<button className="btn" onClick={goHome} style={{background:"rgba(255,255,255,.09)",color:"#1A3A6B",padding:"5px 11px",borderRadius:"5px",fontSize:"12px"}}>← Back</button>}
        <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",fontWeight:"700",color:"#2563C0"}}>SkillVia</div><div style={{fontSize:"10px",color:"rgba(26,58,107,.35)",letterSpacing:".1em",textTransform:"uppercase"}}>AHCA/CMS Survey-Ready</div></div>
      </div>
      <div style={{display:"flex",gap:"7px",alignItems:"center",flexWrap:"wrap"}}>
        {staffName&&<span style={{fontSize:"12px",color:"rgba(26,58,107,.45)"}}>👤 {staffName}</span>}
        {myHours>0&&<span className={`pill ${myHours>=REQUIRED_HOURS?"pill-green":"pill-amber"}`}>⏱ {myHours.toFixed(1)}/{REQUIRED_HOURS} hrs</span>}
        {Object.keys(completed).length>0&&<span className="pill pill-green">{Object.keys(completed).length}/{TOPICS.length} Done</span>}
        <button className="btn" onClick={()=>{setStaffName("");setStaffRecord(null);setCompleted({});setStaffPinInput("");setStaffAuthStep("phone");setMode("landing");}} style={{background:"rgba(255,255,255,.07)",color:"rgba(26,58,107,.4)",padding:"5px 10px",borderRadius:"5px",fontSize:"11px"}}>← Sign Out</button>
      </div>
    </div>
  );

  // policy browse screen (staff)
  if(staffScreen==="policy") {
    const t = TOPICS.find(t=>t.id===browsingPolicy);
    const pol = policies[t.id];
    return (
      <div style={BG}>
        <style>{CSS}</style>
        {TOPBAR}
        <div style={{maxWidth:"760px",margin:"0 auto",padding:"28px 18px"}}>
          <div style={{display:"flex",gap:"10px",alignItems:"center",marginBottom:"20px"}}>
            <span style={{fontSize:"32px"}}>{t.icon}</span>
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"24px",color:"#2563C0"}}>{pol.title}</div>
              <div style={{fontSize:"11px",color:"rgba(26,58,107,.4)",marginTop:"3px"}}>Effective: {pol.effectiveDate} · Approved by: {pol.approvedBy}</div>
            </div>
            {t.mandatory&&<span className="mandatory-badge" style={{marginLeft:"auto"}}>MANDATORY</span>}
          </div>
          <div className="reg-banner" style={{marginBottom:"18px"}}><strong>Regulatory Reference:</strong> {t.cmsRef}</div>
          {Object.entries(SECTION_LABELS).map(([sec,label])=>(
            <div key={sec} className="policy-section"><h4>{label}</h4><pre>{pol.sections[sec]}</pre></div>
          ))}
          <button className="btn" onClick={goHome} style={{background:"#2563C0",color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",marginTop:"14px",width:"100%"}}>← Return to Dashboard</button>
        </div>
      </div>
    );
  }

  return (
    <div style={BG}>
      <style>{CSS}</style>
      {TOPBAR}
      <div style={{maxWidth:"760px",margin:"0 auto",padding:"28px 18px"}}>

        {/* HOME */}
        {staffScreen==="home"&&(
          <div>
            <div style={{textAlign:"center",marginBottom:"28px"}}>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"34px",fontWeight:"900",color:"#2563C0",lineHeight:1.1,marginBottom:"10px"}}>Staff Competency<br/>& Inservice Portal</div>
              <p style={{color:"rgba(26,58,107,.55)",fontSize:"14px",lineHeight:1.6}}>Complete your required inservices digitally — no paper, no printing.<br/>All completions documented per 42 CFR §483.95.</p>
            </div>
            {!staffName?(
              <div className="card" style={{padding:"26px",marginBottom:"26px",textAlign:"center"}}>
                <div style={{fontSize:"26px",marginBottom:"10px"}}>👋</div>
                <div style={{fontSize:"17px",fontWeight:"600",marginBottom:"14px"}}>Enter your name to begin</div>
                <div style={{display:"flex",gap:"9px",maxWidth:"420px",margin:"0 auto 14px"}}>
                  <input type="text" placeholder="Your full name..." value={nameInput} onChange={e=>setNameInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&nameInput.trim()&&(staffPhone?setStaffName(nameInput.trim()):setStaffName(nameInput.trim()))}/>
                </div>
                <div style={{maxWidth:"420px",margin:"0 auto 12px"}}>
                  <input type="text" placeholder="📱 Mobile number (optional, for reminders)" value={staffPhone} onChange={e=>setStaffPhone(e.target.value)} style={{fontSize:"13px"}}/>
                </div>
                {staffPhone.trim() && (
                  <div style={{maxWidth:"420px",margin:"0 auto 14px",background:"rgba(255,255,255,.05)",borderRadius:"8px",padding:"11px 14px",fontSize:"12px",lineHeight:"1.6",color:"rgba(26,58,107,.65)",textAlign:"left"}}>
                    <div onClick={()=>setStaffSmsOptIn(!staffSmsOptIn)} style={{display:"flex",gap:"9px",alignItems:"flex-start",cursor:"pointer"}}>
                      <div style={{width:"14px",height:"14px",borderRadius:"3px",background:staffSmsOptIn?"#27ae60":"rgba(255,255,255,.1)",border:`2px solid ${staffSmsOptIn?"#27ae60":"rgba(255,255,255,.2)"}`,flexShrink:0,marginTop:"2px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"10px"}}>{staffSmsOptIn&&"✓"}</div>
                      <span>I consent to receive SMS text reminders about my required inservices at {facilityName}. Message & data rates may apply. Text STOP to unsubscribe.</span>
                    </div>
                  </div>
                )}
                <div style={{maxWidth:"420px",margin:"0 auto"}}>
                  <button className="btn" onClick={()=>nameInput.trim()&&setStaffName(nameInput.trim())} style={{background:"#2563C0",color:"#1A3A6B",padding:"11px",borderRadius:"7px",fontSize:"13px",width:"100%"}}>Start →</button>
                </div>
              </div>
            ):(
              <div style={{background:"rgba(37,99,192,.1)",border:"1px solid rgba(37,99,192,.28)",borderRadius:"9px",padding:"13px 18px",marginBottom:"22px",display:"flex",gap:"10px",alignItems:"center",flexWrap:"wrap"}}>
                <span style={{fontSize:"18px"}}>👤</span><span style={{fontSize:"14px"}}>Welcome, <strong>{staffName}</strong></span>
                {REQUIRED_HOURS-myHours>0&&<span style={{fontSize:"12px",color:"rgba(26,58,107,.5)",marginLeft:"auto"}}>⏱ {(REQUIRED_HOURS-myHours).toFixed(1)} more hours needed this year</span>}
              </div>
            )}
            {(()=>{
              // Only show topics assigned to this staff member
              // A topic is assigned if it's in their pending[] OR already in completions{}
              const myRecord = staffRecords.find(s=>s.name.toLowerCase()===staffName?.toLowerCase());
              const assignedIds = myRecord
                ? [...new Set([...(myRecord.pending||[]), ...Object.keys(myRecord.completions)])]
                : [];
              const assignedTopics = TOPICS.filter(t=>assignedIds.includes(t.id));
              const mandatoryAssigned = assignedTopics.filter(t=>t.mandatory);
              const allAssignedDone = assignedTopics.length>0 && assignedTopics.every(t=>completed[t.id]);

              if (!staffName) return null;

              if (assignedTopics.length===0) return (
                <div className="card" style={{padding:"40px",textAlign:"center",marginTop:"10px"}}>
                  <div style={{fontSize:"48px",marginBottom:"14px"}}>📋</div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0",marginBottom:"8px"}}>No Inservices Assigned Yet</div>
                  <div style={{color:"rgba(26,58,107,.5)",fontSize:"13px",lineHeight:1.7}}>Your supervisor hasn't assigned any inservices to you yet.<br/>Check back soon or speak with your DON or charge nurse.</div>
                </div>
              );

              return (
                <div>
                  {mandatoryAssigned.length>0&&(
                    <div className="reg-banner" style={{marginBottom:"18px"}}>
                      <strong>📌 Federally Mandatory Topics (42 CFR §483.95):</strong> {mandatoryAssigned.map(t=>t.label).join(", ")} — required by federal law and marked below.
                    </div>
                  )}
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"14px",flexWrap:"wrap",gap:"8px"}}>
                    <div style={{fontSize:"13px",color:"rgba(26,58,107,.5)"}}>
                      <strong style={{color:"#2563C0"}}>{assignedTopics.filter(t=>completed[t.id]).length}</strong> of <strong style={{color:"#2563C0"}}>{assignedTopics.length}</strong> assigned inservices completed
                    </div>
                    {assignedTopics.filter(t=>!completed[t.id]).length>0&&(
                      <span className="pill pill-amber">{assignedTopics.filter(t=>!completed[t.id]).length} Pending</span>
                    )}
                  </div>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"13px"}}>
                    {assignedTopics.map(t=>{const done=completed[t.id];return(
                      <div key={t.id} style={{padding:"18px",borderRadius:"14px",cursor:"pointer",border:`2px solid ${done?"#27ae60":`${t.color}66`}`,background:`linear-gradient(135deg,${t.color}44 0%,${t.color}22 100%)`,transition:"all .22s"}}
                        onClick={()=>startTopic(t.id)}
                        onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-3px)";}}
                        onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"8px"}}>
                          <span style={{fontSize:"32px"}}>{t.icon}</span>
                          {t.mandatory&&!done&&<span className="mandatory-badge">MANDATORY</span>}
                          {done&&<span className="pill pill-green" style={{fontSize:"10px"}}>✓ DONE</span>}
                        </div>
                        <div style={{fontFamily:"'Playfair Display',serif",fontSize:"16px",fontWeight:"700",marginBottom:"5px",color:done?"#27ae60":"#2563C0"}}>{t.label}</div>
                        <div style={{fontSize:"11px",color:"rgba(26,58,107,.45)",marginBottom:"8px"}}>{t.questions.length} questions · {t.checklist.length}-item checklist · ~{t.estimatedHours}hr</div>
                        <button className="btn" onClick={e=>{e.stopPropagation();setBrowsingPolicy(t.id);setStaffScreen("policy");}} style={{background:"rgba(255,255,255,.08)",color:"rgba(26,58,107,.55)",padding:"4px 10px",borderRadius:"5px",fontSize:"11px",border:"1px solid rgba(255,255,255,.13)"}}>📋 View Policy</button>
                      </div>
                    );})}
                  </div>
                  {allAssignedDone&&(
                    <div style={{marginTop:"26px",padding:"26px",textAlign:"center",background:"rgba(39,174,96,.14)",border:"2px solid #27ae60",borderRadius:"14px"}}>
                      <div style={{fontSize:"44px",marginBottom:"10px"}}>🏆</div>
                      <div style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",color:"#27ae60",marginBottom:"7px"}}>All Assigned Inservices Complete!</div>
                      <div style={{color:"rgba(26,58,107,.65)",fontSize:"13px",lineHeight:1.6}}>{staffName} has completed all {assignedTopics.length} assigned inservices.<br/>Total hours: <strong>{myHours.toFixed(1)} hrs</strong> · Documented per 42 CFR §483.95.</div>
                    </div>
                  )}
                </div>
              );
            })()}

            {/* MANUAL INSERVICES for staff */}
            {(()=>{
              const myRecord = staffRecords.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
              const myInservices = manualInservices.filter(ins=>{
                if(ins.assignedTo==="all") return true;
                if(ins.assignedTo==="custom" && myRecord) return ins.assignedIds?.includes(myRecord.id);
                return true;
              });
              if(!staffName || myInservices.length===0) return null;
              const pending = myInservices.filter(ins=>!myRecord||!ins.signatures[myRecord?.id]);
              return (
                <div style={{marginTop:"28px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0"}}>📋 Facility Notices & Manual Inservices</div>
                    {pending.length>0&&<span className="pill pill-red">{pending.length} Pending Signature</span>}
                  </div>
                  {myInservices.map(ins=>{
                    const hasSigned = myRecord && ins.signatures[myRecord.id];
                    return (
                      <div key={ins.id} className="card" style={{padding:"18px",marginBottom:"10px",border:`1px solid ${hasSigned?"rgba(39,174,96,.3)":"rgba(37,99,192,.3)"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px",marginBottom:"10px"}}>
                          <div>
                            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"4px"}}>{ins.title}</div>
                            <div style={{fontSize:"11px",color:"rgba(26,58,107,.45)"}}>Issued by {ins.createdBy} · {ins.createdDate}{ins.dueDate&&<span style={{color:"#2563C0"}}> · Due: {ins.dueDate}</span>}</div>
                          </div>
                          {hasSigned
                            ? <span className="pill pill-green">✓ Signed {ins.signatures[myRecord.id].date}</span>
                            : <span className="pill pill-amber">⚠ Signature Required</span>}
                        </div>
                        <div style={{background:"rgba(255,255,255,.04)",borderRadius:"8px",padding:"13px 15px",marginBottom:"12px",fontSize:"13px",lineHeight:"1.75",color:"rgba(26,58,107,.82)",whiteSpace:"pre-wrap"}}>{ins.content}</div>
                        {!hasSigned && staffName && (
                          <div>
                            <div style={{background:"rgba(37,99,192,.1)",border:"1px solid rgba(37,99,192,.25)",borderRadius:"8px",padding:"11px 14px",fontSize:"12px",color:"rgba(26,58,107,.7)",lineHeight:"1.6",marginBottom:"10px"}}>
                              ✍️ By signing, <strong>{staffName}</strong> confirms they have read and understood the above notice and will comply accordingly.
                            </div>
                            <button className="btn" onClick={()=>{
                              if(!myRecord){alert("Your name was not found in staff records. Please ask your supervisor to add you.");return;}
                              signManualInservice(ins.id, myRecord);
                            }} style={{background:"#27ae60",color:"white",padding:"11px 22px",borderRadius:"7px",fontSize:"13px",fontWeight:"700"}}>
                              ✍️ I Have Read & Understood — Sign Now
                            </button>
                          </div>
                        )}
                        {hasSigned && (
                          <div style={{fontSize:"11px",color:"#58d68d"}}>✅ Electronically acknowledged and signed on {ins.signatures[myRecord.id].date}</div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

            {/* COMPETENCY CHECKLISTS for staff */}
            {(()=>{
              if (!staffName) return null;
              const myRecord = staffRecords.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
              const myDeps = deployedCompetencies.filter(dep => {
                if (dep.assignedTo === "all") return true;
                if (dep.assignedTo === "custom" && myRecord) return dep.assignedIds?.includes(myRecord.id);
                return false;
              });
              if (myDeps.length === 0) return null;
              const pendingDeps = myDeps.filter(dep => myRecord && !dep.completions?.[myRecord.id]);
              return (
                <div style={{marginTop:"28px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px",flexWrap:"wrap"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0"}}>🗂 Skill Competency Checklists</div>
                    {pendingDeps.length>0&&<span className="pill pill-amber">{pendingDeps.length} Pending</span>}
                  </div>
                  {myDeps.map(dep => {
                    const comp = COMPETENCY_CHECKLISTS.find(c=>c.id===dep.competencyId);
                    const myComp = myRecord && dep.completions?.[myRecord.id];
                    const isObserved = dep.validationType === "observed";
                    return (
                      <div key={dep.id} className="card" style={{padding:"18px",marginBottom:"10px",border:`1px solid ${myComp?"rgba(39,174,96,.3)":isObserved?"rgba(41,128,185,.3)":"rgba(37,99,192,.3)"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px",marginBottom:"10px"}}>
                          <div style={{display:"flex",gap:"9px",alignItems:"center"}}>
                            <span style={{fontSize:"24px"}}>{comp.icon}</span>
                            <div>
                              <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"3px"}}>{comp.title}</div>
                              <div style={{fontSize:"11px",color:"rgba(26,58,107,.45)"}}>
                                Deployed {dep.deployedDate}
                                {dep.dueDate&&<span style={{color:"#2563C0"}}> · Due: {dep.dueDate}</span>}
                              </div>
                            </div>
                          </div>
                          {myComp
                            ? <span className="pill pill-green">✓ Complete</span>
                            : isObserved
                            ? <span className="pill pill-blue" style={{fontSize:"10px"}}>👁 Awaiting Observation</span>
                            : <span className="pill pill-amber">📋 Self-Assessment Required</span>}
                        </div>
                        {myComp ? (
                          <div style={{fontSize:"12px",color:"rgba(26,58,107,.55)",lineHeight:"1.8"}}>
                            Completed {myComp.date} · {Object.values(myComp.items||{}).filter(Boolean).length}/{comp.steps.length} steps verified · {myComp.validatedBy}
                          </div>
                        ) : isObserved ? (
                          <div style={{background:"rgba(41,128,185,.1)",border:"1px solid rgba(41,128,185,.25)",borderRadius:"8px",padding:"12px 14px",fontSize:"12px",color:"rgba(26,58,107,.7)",lineHeight:"1.7"}}>
                            👁 <strong>In-Person Observation Required</strong><br/>
                            Your supervisor will observe you performing this skill and check off each step. You do not need to complete this yourself — please notify your supervisor you are ready to be observed.
                          </div>
                        ) : (
                          <div>
                            <div style={{background:"rgba(255,255,255,.04)",borderRadius:"8px",padding:"11px 14px",fontSize:"12px",color:"rgba(26,58,107,.65)",lineHeight:"1.6",marginBottom:"12px"}}>
                              📋 Review and self-certify each step below. Check each item you are able to perform competently.
                            </div>
                            <button className="btn" onClick={()=>{setStaffCompScreen(dep.id);setStaffCompItems({});}}
                              style={{background:comp.accent,color:"#1A3A6B",padding:"10px 20px",borderRadius:"7px",fontSize:"13px"}}>
                              Start Self-Assessment →
                            </button>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

        {/* TOPIC FLOW */}
        {staffScreen==="topic"&&topic&&(
          <div>
            <div style={{marginBottom:"24px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"7px",fontSize:"11px",color:"rgba(26,58,107,.45)"}}>
                <div style={{display:"flex",gap:"8px",alignItems:"center"}}><span style={{color:topic.accent,fontWeight:"600"}}>{topic.icon} {topic.label}</span>{topic.mandatory&&<span className="mandatory-badge">MANDATORY</span>}</div>
                <span>{Math.round((stepIdx/(STEPS.length-1))*100)}% complete</span>
              </div>
              <div style={{height:"4px",background:"rgba(255,255,255,.1)",borderRadius:"4px"}}><div style={{height:"100%",width:`${Math.round((stepIdx/(STEPS.length-1))*100)}%`,background:topic.accent,borderRadius:"4px",transition:"width .35s"}}/></div>
              <div style={{display:"flex",gap:"5px",marginTop:"9px",justifyContent:"center"}}>
                {STEPS.map((s,i)=><div key={s} className={`step-dot ${i<stepIdx?"done":i===stepIdx?"active":""}`}/>)}
              </div>
            </div>

            {/* ASSIGN */}
            {step==="assign"&&(
              <div className="card" style={{padding:"32px",textAlign:"center"}}>
                <div style={{fontSize:"52px",marginBottom:"14px"}}>{topic.icon}</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:"700",color:"#2563C0",marginBottom:"10px"}}>{topic.label}</div>
                {topic.mandatory&&<div style={{marginBottom:"12px"}}><span className="mandatory-badge" style={{fontSize:"11px",padding:"4px 10px"}}>FEDERALLY MANDATORY — {topic.cmsRef}</span></div>}
                <div style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:"9px",padding:"15px",marginBottom:"18px",fontSize:"13px",color:"rgba(26,58,107,.75)",lineHeight:"1.9",textAlign:"left"}}>
                  📋 Assigned to: <strong>{staffName}</strong><br/>
                  📅 Date: <strong>{new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}</strong><br/>
                  ⏱ Estimated: <strong>~{topic.estimatedHours} hours</strong> toward your annual {REQUIRED_HOURS}-hr requirement<br/>
                  ✅ Passing score: <strong>{PASSING}% or higher</strong>
                </div>
                <div style={{display:"flex",gap:"10px",justifyContent:"center",flexWrap:"wrap"}}>
                  <button className="btn" onClick={()=>setStep("policy")} style={{background:"rgba(255,255,255,.08)",color:"rgba(26,58,107,.7)",padding:"12px 22px",borderRadius:"7px",fontSize:"13px",border:"1px solid rgba(255,255,255,.13)"}}>📋 Review Policy First</button>
                  <button className="btn" onClick={()=>setStep("policy")} style={{background:topic.accent,color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px"}}>Begin Inservice →</button>
                </div>
              </div>
            )}

            {/* POLICY STEP (within module) */}
            {step==="policy"&&(
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"700",color:"#2563C0",marginBottom:"16px"}}>📋 Facility Policy Review</div>
                <div style={{background:"rgba(39,174,96,.1)",border:"1px solid rgba(39,174,96,.28)",borderRadius:"9px",padding:"12px 16px",marginBottom:"16px",fontSize:"12px",color:"rgba(26,58,107,.75)"}}>
                  Please read your facility's policy carefully. You will be expected to apply this policy in your work and in the knowledge assessment.
                </div>
                <div style={{background:`linear-gradient(to right,${topic.color}55,${topic.color}22)`,borderRadius:"10px",padding:"16px 18px",marginBottom:"16px",display:"flex",gap:"10px",alignItems:"center"}}>
                  <span style={{fontSize:"24px"}}>{topic.icon}</span>
                  <div>
                    <div style={{fontWeight:"700",fontSize:"14px"}}>{policies[topic.id]?.title || topic.label + " Policy"}</div>
                    <div style={{fontSize:"11px",color:"rgba(26,58,107,.5)",marginTop:"2px"}}>Effective: {policies[topic.id]?.effectiveDate || "2026-01-01"} · Approved by: {policies[topic.id]?.approvedBy || "Director of Nursing"}</div>
                  </div>
                </div>
                {Object.entries(SECTION_LABELS).map(([sec,label])=>(
                  <div key={sec} className="policy-section"><h4>{label}</h4><pre>{policies[topic.id]?.sections?.[sec] || ""}</pre></div>
                ))}
                <div style={{background:"rgba(37,99,192,.1)",border:"1px solid rgba(37,99,192,.28)",borderRadius:"9px",padding:"13px 16px",marginBottom:"14px",fontSize:"12px",color:"rgba(26,58,107,.72)"}}>
                  ✅ By proceeding, you confirm you have read and understand this facility policy.
                </div>
                <button className="btn" onClick={()=>setStep("learn")} style={{background:topic.accent,color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",width:"100%"}}>I've Read the Policy — Continue →</button>
              </div>
            )}

            {/* LEARN */}
            {step==="learn"&&(
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"700",color:"#2563C0",marginBottom:"16px"}}>📚 Learning Module</div>
                <div style={{background:"rgba(0,0,0,.38)",border:`2px dashed ${topic.accent}55`,borderRadius:"11px",padding:"36px",textAlign:"center",marginBottom:"18px"}}>
                  <div style={{fontSize:"44px",marginBottom:"8px"}}>▶️</div>
                  <div style={{fontSize:"15px",color:"rgba(26,58,107,.65)",marginBottom:"5px"}}>{topic.label} Training Video</div>
                  <div style={{fontSize:"11px",color:"rgba(26,58,107,.35)"}}>Attach your facility's approved training video URL here</div>
                </div>
                <div className="card" style={{padding:"20px",marginBottom:"16px"}}>
                  <div style={{fontSize:"14px",fontWeight:"600",marginBottom:"12px",color:topic.accent}}>Key Learning Points — Review Before Quiz</div>
                  {topic.learningPoints.map((pt,i)=>(
                    <div key={i} style={{display:"flex",gap:"9px",marginBottom:"9px",fontSize:"13px",lineHeight:"1.55",color:"rgba(26,58,107,.82)"}}><span style={{color:topic.accent,minWidth:"14px",marginTop:"1px"}}>›</span><span>{pt}</span></div>
                  ))}
                </div>
                <button className="btn" onClick={()=>setStep("quiz")} style={{background:topic.accent,color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",width:"100%"}}>Proceed to Quiz →</button>
              </div>
            )}

            {/* QUIZ */}
            {step==="quiz"&&(
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"700",color:"#2563C0",marginBottom:"16px"}}>📝 Knowledge Assessment</div>
                {topic.questions.map((q,qi)=>(
                  <div key={qi} className="card" style={{padding:"18px",marginBottom:"12px"}}>
                    <div style={{fontSize:"11px",color:"rgba(26,58,107,.38)",marginBottom:"7px"}}>Question {qi+1} of {topic.questions.length}</div>
                    <div style={{fontSize:"14px",fontWeight:"600",marginBottom:"12px",lineHeight:"1.5"}}>{q.q}</div>
                    {q.options.map((opt,oi)=>{
                      let cls="option-btn";
                      if(quizSubmitted){if(oi===q.correct)cls+=" correct";else if(quizAnswers[qi]===oi)cls+=" wrong";}
                      else if(quizAnswers[qi]===oi)cls+=" selected";
                      return <button key={oi} className={cls} disabled={quizSubmitted} onClick={()=>!quizSubmitted&&setQuizAnswers(p=>({...p,[qi]:oi}))}><span style={{marginRight:"7px",opacity:.45}}>{String.fromCharCode(65+oi)}.</span>{opt}</button>;
                    })}
                  </div>
                ))}
                {!quizSubmitted?(
                  <button className="btn" disabled={Object.keys(quizAnswers).length<topic.questions.length} onClick={()=>setQuizSubmitted(true)} style={{background:topic.accent,color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",width:"100%"}}>Submit Quiz ({Object.keys(quizAnswers).length}/{topic.questions.length} answered)</button>
                ):(
                  <div style={{padding:"22px",borderRadius:"11px",textAlign:"center",background:passed?"rgba(39,174,96,.14)":"rgba(231,76,60,.14)",border:`2px solid ${passed?"#27ae60":"#e74c3c"}`}}>
                    <div style={{fontSize:"34px",marginBottom:"7px"}}>{passed?"🎉":"📖"}</div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:passed?"#27ae60":"#e74c3c",marginBottom:"5px"}}>{passed?"Quiz Passed!":`Score Below ${PASSING}%`}</div>
                    <div style={{fontSize:"15px",marginBottom:"14px"}}>Score: <strong>{score}/{topic.questions.length}</strong> ({Math.round(score/topic.questions.length*100)}%)</div>
                    {passed?<button className="btn" onClick={()=>setStep("checklist")} style={{background:"#27ae60",color:"white",padding:"11px 26px",borderRadius:"7px",fontSize:"13px"}}>Continue to Checklist →</button>
                    :<button className="btn" onClick={()=>{setQuizAnswers({});setQuizSubmitted(false);}} style={{background:"#e74c3c",color:"white",padding:"11px 26px",borderRadius:"7px",fontSize:"13px"}}>Retake Quiz</button>}
                  </div>
                )}
              </div>
            )}

            {/* CHECKLIST */}
            {step==="checklist"&&(
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"700",color:"#2563C0",marginBottom:"7px"}}>✅ Skills Checklist</div>
                <p style={{color:"rgba(26,58,107,.55)",fontSize:"13px",marginBottom:"16px"}}>Check off each item to confirm you can perform each skill per your facility's policy. This is your competency attestation.</p>
                <div className="card" style={{padding:"18px",marginBottom:"16px"}}>
                  {topic.checklist.map((item,i)=>{const key=`${topic.id}-${i}`;const ck=checklist[key];return(
                    <div key={i} className="check-item" onClick={()=>setChecklist(p=>({...p,[key]:!p[key]}))}>
                      <div style={{width:"20px",height:"20px",borderRadius:"5px",flexShrink:0,marginTop:"1px",background:ck?topic.accent:"rgba(255,255,255,.08)",border:`2px solid ${ck?topic.accent:"rgba(255,255,255,.18)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",transition:"all .15s"}}>{ck&&"✓"}</div>
                      <span style={{fontSize:"13px",lineHeight:"1.5",color:ck?"#1A3A6B":"rgba(26,58,107,.65)"}}>{item}</span>
                    </div>
                  );})}
                </div>
                <div style={{fontSize:"12px",color:"rgba(26,58,107,.38)",marginBottom:"10px",textAlign:"center"}}>{topic.checklist.filter((_,i)=>checklist[`${topic.id}-${i}`]).length}/{topic.checklist.length} items confirmed</div>
                <button className="btn" disabled={!allChecked} onClick={()=>setStep("validate")} style={{background:allChecked?topic.accent:"rgba(255,255,255,.08)",color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",width:"100%"}}>Proceed to Validation →</button>
              </div>
            )}

            {/* VALIDATE */}
            {step==="validate"&&(
              <div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",fontWeight:"700",color:"#2563C0",marginBottom:"7px"}}>🔍 Competency Validation</div>
                <p style={{color:"rgba(26,58,107,.55)",fontSize:"13px",marginBottom:"20px"}}>Choose your validation method. Per 42 CFR §483.35, training is conducted under DON general supervision.</p>
                {!validationMode?(
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"14px"}}>
                    {[{id:"self",icon:"📋",title:"Self-Assessment",desc:"Digital sign-off confirming you can perform the skills. Supervisor may follow up."},{id:"supervisor",icon:"👩‍⚕️",title:"Supervisor Review",desc:"Supervisor directly verifies your skills via observation or video review."}].map(v=>(
                      <div key={v.id} className="card" style={{padding:"22px",cursor:"pointer",textAlign:"center"}} onClick={()=>setValidationMode(v.id)}>
                        <div style={{fontSize:"34px",marginBottom:"10px"}}>{v.icon}</div>
                        <div style={{fontWeight:"600",fontSize:"15px",marginBottom:"7px",color:topic.accent}}>{v.title}</div>
                        <div style={{fontSize:"12px",color:"rgba(26,58,107,.55)",lineHeight:"1.5"}}>{v.desc}</div>
                      </div>
                    ))}
                  </div>
                ):validationMode==="self"?(
                  <div className="card" style={{padding:"26px",textAlign:"center"}}>
                    <div style={{fontSize:"34px",marginBottom:"10px"}}>📋</div>
                    <div style={{fontSize:"15px",fontWeight:"600",marginBottom:"14px"}}>Self-Assessment Sign-Off</div>
                    <div style={{background:"rgba(255,255,255,.05)",borderRadius:"9px",padding:"14px",marginBottom:"18px",fontSize:"12px",color:"rgba(26,58,107,.72)",lineHeight:"1.8",textAlign:"left"}}>
                      By signing, <strong>{staffName}</strong> attests they have:<br/>
                      • Completed the <strong>{topic.label}</strong> learning module<br/>
                      • Read and understood the facility policy<br/>
                      • Passed the knowledge assessment at {PASSING}% or higher<br/>
                      • Can competently perform all checklist skills
                    </div>
                    <button className="btn" onClick={()=>setStep("complete")} style={{background:topic.accent,color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px"}}>✍️ Sign & Submit</button>
                  </div>
                ):(
                  <div className="card" style={{padding:"26px",textAlign:"center"}}>
                    <div style={{fontSize:"34px",marginBottom:"10px"}}>👩‍⚕️</div>
                    <div style={{fontSize:"15px",fontWeight:"600",marginBottom:"14px"}}>Supervisor Review</div>
                    <div style={{background:"rgba(255,255,255,.05)",borderRadius:"9px",padding:"14px",marginBottom:"18px",fontSize:"12px",color:"rgba(26,58,107,.72)",lineHeight:"1.8"}}>
                      Pending supervisor sign-off for <strong>{staffName}</strong>'s <strong>{topic.label}</strong> competency.<br/><br/>
                      Your supervisor will verify skills via observation or review and approve in the Admin Dashboard.
                    </div>
                    <button className="btn" onClick={()=>setStep("complete")} style={{background:"#27ae60",color:"white",padding:"13px 30px",borderRadius:"7px",fontSize:"14px"}}>✓ Supervisor Verified — Complete</button>
                  </div>
                )}
              </div>
            )}

            {/* COMPLETE */}
            {step==="complete"&&(
              <div className="card" style={{padding:"36px",textAlign:"center"}}>
                <div style={{fontSize:"58px",marginBottom:"14px"}}>🎓</div>
                <div style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:"700",color:"#27ae60",marginBottom:"10px"}}>Competency Complete!</div>
                <div style={{fontSize:"14px",color:"rgba(26,58,107,.65)",marginBottom:"20px",lineHeight:"1.6"}}><strong>{staffName}</strong> has successfully completed<br/><strong style={{color:topic.accent}}>{topic.label}</strong>.</div>
                <div style={{background:"rgba(255,255,255,.05)",border:"1px solid rgba(255,255,255,.09)",borderRadius:"9px",padding:"15px",marginBottom:"20px",fontSize:"12px",color:"rgba(26,58,107,.58)",lineHeight:"2",textAlign:"left"}}>
                  📅 Completed: {new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"})}<br/>
                  📊 Quiz Score: {Math.round(score/topic.questions.length*100)}%<br/>
                  📋 Policy Reviewed: {policies[topic.id]?.title || topic.label + " Policy"}<br/>
                  ⏱ Hours Credited: ~{topic.estimatedHours} hrs toward annual {REQUIRED_HOURS}-hr requirement<br/>
                  ✅ Checklist: All {topic.checklist.length} items verified<br/>
                  🔍 Validation: {validationMode==="self"?"Self sign-off (supervisor review available)":"Supervisor verified"}<br/>
                  📋 Regulation: {topic.cmsRef}
                </div>
                <button className="btn" onClick={async ()=>{
                  setCompleted(p=>({...p,[topic.id]:true}));
                  setSessionHours(p=>({...p,[topic.id]:topic.estimatedHours}));
                  // Find staff record by name (logged-in staff)
                  const sRec = staffRecords.find(s=>(s.name||s.full_name||"").toLowerCase()===staffName.toLowerCase());
                  if (sRec) {
                    const attText = `${staffName} has completed ${topic.label} at ${facilityName} on ${new Date().toLocaleDateString()}. Quiz: ${Math.round(score/topic.questions.length*100)}%. Validation: ${validationMode==="self"?"Self sign-off":"Supervisor verified"}.`;
                    try { await api("save_completion", {
                      staff_id: sRec.id, facility_id: FACILITY_ID, topic_id: topic.id,
                      quiz_score: Math.round(score/topic.questions.length*100),
                      questions_correct: score, questions_total: topic.questions.length,
                      hours_credited: topic.estimatedHours,
                      validation_type: validationMode === "supervisor" ? "supervisor" : "self",
                      policy_acknowledged: 1, attestation_text: attText
                    }, "POST"); } catch(e) { console.warn("Completion save failed:", e.message); }
                    // Update local staff records so admin dashboard reflects immediately
                    const compObj = { score: Math.round(score/topic.questions.length*100), date: new Date().toISOString().split("T")[0], hours: topic.estimatedHours, validation: validationMode==="supervisor"?"Supervisor verified":"Self sign-off", note:"" };
                    setStaffRecords(p=>p.map(s=>s.id!==sRec.id?s:{...s, completions:{...s.completions,[topic.id]:compObj}, pending:s.pending.filter(pid=>pid!==topic.id)}));
                  }
                  goHome();
                }} style={{background:"#2563C0",color:"#1A3A6B",padding:"13px 30px",borderRadius:"7px",fontSize:"14px",fontWeight:"700"}}>← Return to Dashboard</button>
              </div>
            )}
          </div>
        )}

            {/* MEETINGS for staff */}
            {(()=>{
              if (!staffName) return null;
              const myRecord = staffRecords.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
              const myMeetings = meetings.filter(mtg => {
                if (mtg.assignedTo === "all") return true;
                if (mtg.assignedTo === "custom" && myRecord) return mtg.assignedIds?.includes(myRecord.id);
                return false;
              });
              if (myMeetings.length === 0) return null;
              const pendingMeetings = myMeetings.filter(mtg => !mtg.attendees?.[myRecord?.id]);
              return (
                <div style={{marginTop:"28px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:"10px",marginBottom:"14px",flexWrap:"wrap"}}>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0"}}>🎥 Facility Meetings</div>
                    {pendingMeetings.length>0&&<span className="pill pill-red">{pendingMeetings.length} Pending Acknowledgment</span>}
                  </div>
                  {myMeetings.map(mtg=>{
                    const hasAttended = myRecord && mtg.attendees?.[myRecord.id];
                    return (
                      <div key={mtg.id} className="card" style={{padding:"18px",marginBottom:"10px",border:`1px solid ${hasAttended?"rgba(39,174,96,.3)":"rgba(155,89,182,.4)"}`}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"10px",marginBottom:"10px"}}>
                          <div>
                            <div style={{fontWeight:"700",fontSize:"14px",marginBottom:"4px"}}>🎥 {mtg.title}</div>
                            <div style={{fontSize:"11px",color:"rgba(26,58,107,.45)"}}>Uploaded {mtg.uploadedDate}{mtg.inPersonDate&&<span style={{color:"#2563C0"}}> · In-Person Date: {mtg.inPersonDate}</span>}</div>
                          </div>
                          {hasAttended
                            ? <span className="pill pill-green">✅ {mtg.attendees[myRecord.id].type==="inperson"?"In-Person":"Virtually"} Attended · {mtg.attendees[myRecord.id].date}</span>
                            : <span className="pill" style={{background:"rgba(155,89,182,.2)",color:"#bb8fce",border:"1px solid rgba(155,89,182,.35)"}}>📣 Attendance Required</span>}
                        </div>
                        {mtg.description && <div style={{fontSize:"12px",color:"rgba(26,58,107,.6)",marginBottom:"10px",lineHeight:"1.5"}}>{mtg.description}</div>}
                        {!hasAttended && (
                          <div>
                            {mtg.videoUrl && (
                              <div style={{background:"rgba(155,89,182,.1)",border:"1px solid rgba(155,89,182,.3)",borderRadius:"8px",padding:"12px 14px",marginBottom:"10px",fontSize:"12px",color:"rgba(26,58,107,.7)",lineHeight:"1.6"}}>
                                📹 <strong>Meeting Recording Available:</strong><br/>
                                <a href={mtg.videoUrl} target="_blank" rel="noopener noreferrer" style={{color:"#5dade2",wordBreak:"break-all"}} onClick={()=>setMeetingVideoWatched(true)}>{mtg.videoUrl}</a><br/>
                                <span style={{fontSize:"11px",color:"rgba(26,58,107,.45)"}}>Click to open recording in a new tab. After watching, return here and acknowledge attendance below.</span>
                              </div>
                            )}
                            <div style={{background:"rgba(37,99,192,.1)",border:"1px solid rgba(37,99,192,.25)",borderRadius:"8px",padding:"11px 14px",fontSize:"12px",color:"rgba(26,58,107,.7)",lineHeight:"1.6",marginBottom:"10px"}}>
                              ✍️ By acknowledging, <strong>{staffName}</strong> confirms they have watched/attended the <strong>{mtg.title}</strong> meeting recording and understand the content presented.
                            </div>
                            <button className="btn" onClick={()=>{
                              if(!myRecord){alert("Your name was not found in staff records. Please ask your supervisor to add you.");return;}
                              const updated = {...mtg, attendees:{...mtg.attendees,[myRecord.id]:{date:new Date().toISOString().split("T")[0],type:"virtual"}}};
                              setMeetings(p=>p.map(m=>m.id===mtg.id?updated:m));
                            }} style={{background:"#9b59b6",color:"white",padding:"11px 22px",borderRadius:"7px",fontSize:"13px",fontWeight:"700"}}>
                              ✅ I Have Watched — Acknowledge Attendance
                            </button>
                          </div>
                        )}
                        {hasAttended && (
                          <div style={{fontSize:"11px",color:"#58d68d"}}>
                            ✅ Attendance recorded {mtg.attendees[myRecord.id].type==="inperson"?"in-person":"virtually"} on {mtg.attendees[myRecord.id].date}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>
              );
            })()}

      </div>
      {/* STAFF COMPETENCY SELF-ASSESSMENT MODAL */}
      {staffCompScreen && staffName && (() => {
        const dep = deployedCompetencies.find(d=>d.id===staffCompScreen);
        if (!dep) return null;
        const comp = COMPETENCY_CHECKLISTS.find(c=>c.id===dep.competencyId);
        if (!comp) return null;
        const allCheckedComp = comp.steps.every((_,i)=>staffCompItems[i]);
        const myRecord = staffRecords.find(s=>s.name.toLowerCase()===staffName.toLowerCase());
        return (
          <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setStaffCompScreen(null)}>
            <div className="modal" style={{maxWidth:"640px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:"16px"}}>
                <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                  <span style={{fontSize:"28px"}}>{comp.icon}</span>
                  <div>
                    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0"}}>{comp.title}</div>
                    <div style={{fontSize:"11px",color:"rgba(26,58,107,.4)",marginTop:"2px"}}>Self-Assessment Checklist — {staffName}</div>
                  </div>
                </div>
                <button className="btn" onClick={()=>setStaffCompScreen(null)} style={{background:"rgba(255,255,255,.08)",color:"rgba(26,58,107,.5)",padding:"5px 10px",borderRadius:"5px",fontSize:"12px"}}>✕</button>
              </div>
              <div style={{background:"rgba(37,99,192,.1)",border:"1px solid rgba(37,99,192,.25)",borderRadius:"8px",padding:"12px 14px",fontSize:"12px",color:"rgba(26,58,107,.7)",lineHeight:"1.6",marginBottom:"14px"}}>
                📋 Check each step you are able to perform correctly and safely. By submitting, you attest that you can competently perform all checked skills.
              </div>
              <div style={{maxHeight:"400px",overflowY:"auto",marginBottom:"14px"}}>
                {comp.steps.map((step,i)=>(
                  <div key={i} className="check-item" onClick={()=>setStaffCompItems(p=>({...p,[i]:!p[i]}))}>
                    <div style={{width:"20px",height:"20px",borderRadius:"5px",flexShrink:0,marginTop:"1px",background:staffCompItems[i]?comp.accent:"rgba(255,255,255,.08)",border:`2px solid ${staffCompItems[i]?comp.accent:"rgba(255,255,255,.18)"}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"12px",transition:"all .15s"}}>{staffCompItems[i]&&"✓"}</div>
                    <div style={{flex:1}}>
                      <span style={{fontSize:"10px",color:comp.accent,fontWeight:"600",marginRight:"6px"}}>{i+1}.</span>
                      <span style={{fontSize:"13px",lineHeight:"1.5",color:staffCompItems[i]?"#1A3A6B":"rgba(26,58,107,.65)"}}>{step}</span>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:"12px",color:"rgba(26,58,107,.38)",textAlign:"center",marginBottom:"12px"}}>
                {Object.values(staffCompItems).filter(Boolean).length}/{comp.steps.length} steps checked
              </div>
              <div style={{display:"flex",gap:"8px"}}>
                <button className="btn" disabled={!allCheckedComp} onClick={()=>{
                  if(!myRecord){alert("Your name was not found in staff records. Ask your supervisor to add you.");return;}
                  markCompetencyComplete(dep.id, myRecord.id, "Self-assessed", {...staffCompItems});
                }} style={{background:allCheckedComp?comp.accent:"rgba(255,255,255,.1)",color:"#1A3A6B",padding:"12px 20px",borderRadius:"7px",fontSize:"13px",flex:1}}>
                  ✍️ Submit Self-Assessment
                </button>
                <button className="btn" onClick={()=>setStaffCompScreen(null)} style={{background:"rgba(255,255,255,.07)",color:"rgba(26,58,107,.5)",padding:"12px 16px",borderRadius:"7px",fontSize:"13px"}}>Cancel</button>
              </div>
            </div>
          </div>
        );
      })()}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
