<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── POLICIES ──────────────────────────────────────────────────────────────────
const DEFAULT_POLICIES = {
  fall: {
    title: "Fall Prevention Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Director of Nursing",
    sections: {
      purpose: "To establish a systematic, evidence-based approach to identifying residents at risk for falls and implementing individualized interventions to prevent falls and minimize fall-related injuries throughout the facility.",
      scope: "This policy applies to all nursing staff (RNs, LPNs, CNAs), therapy staff, and any other personnel providing direct care to residents in this facility.",
      procedure: `1. FALL RISK ASSESSMENT
   • Complete a fall risk assessment using the facility-approved tool (Morse Fall Scale or equivalent) on admission, readmission, after any fall, and with any significant change in condition.
   • Document results in the resident's medical record and communicate findings to the interdisciplinary team.

2. CARE PLANNING
   • Develop an individualized fall prevention care plan for all residents identified as high risk (score ≥45 on Morse scale).
   • Update care plan within 24 hours of any fall event.
   • Involve the resident and family in care plan development.

3. ENVIRONMENTAL SAFETY
   • Maintain bed in lowest position at all times unless care is being provided.
   • Ensure bed exit alarm is activated and functioning for all high-risk residents.
   • Keep call light within resident's reach at all times.
   • Keep floor clear of clutter, cords, and wet surfaces.
   • Ensure adequate lighting, especially during nighttime hours.

4. MONITORING & ROUNDING
   • Conduct and document hourly rounding on all high-risk residents.
   • Offer toileting assistance during each rounding pass.
   • Document all rounding in the nursing notes.

5. POST-FALL PROTOCOL
   • Assess resident thoroughly before moving; call for assistance if injury is suspected.
   • Notify charge nurse and physician within required timeframes.
   • Complete incident report per facility policy within 24 hours.
   • Conduct post-fall huddle with involved staff within 24 hours.
   • Analyze fall circumstances and revise care plan within 24 hours.`,
      references: "42 CFR §483.25(d) — Quality of Care: Accidents\nCMS F-Tag F689 — Free of Accident Hazards/Supervision/Devices\nFlorida Statute §400.23 — Rules; Evaluation and Deficiencies\nMorse Fall Scale (1989) — Morse, J.M."
    }
  },
  med: {
    title: "Medication Management Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Director of Nursing / Consultant Pharmacist",
    sections: {
      purpose: "To ensure safe, accurate, and timely administration of medications to all residents in accordance with physician orders, federal and state regulations, and evidence-based practice standards.",
      scope: "This policy applies to all licensed nurses (RNs, LPNs) and Qualified Medication Aides (QMAs) authorized to administer medications under Florida law. CNAs are not authorized to administer medications but must understand safe handling and documentation principles.",
      procedure: `1. THE FIVE RIGHTS
   • Before every medication administration, verify:
     – Right Resident (two identifiers: name + date of birth or ID band)
     – Right Medication (match label to MAR)
     – Right Dose (confirm dose against order)
     – Right Route (oral, topical, sublingual, etc.)
     – Right Time (within 1-hour window of scheduled time)

2. MEDICATION ADMINISTRATION
   • Review the current Medication Administration Record (MAR) before administration.
   • Check for known allergies before administering any new medication.
   • Never pre-pour or pre-draw medications.
   • Remain with the resident until medication is swallowed.
   • Document administration immediately after giving — never in advance.

3. REFUSALS
   • If a resident refuses medication, document the refusal on the MAR with reason.
   • Notify the charge nurse and document notification.
   • Never coerce, deceive, or force medication administration.

4. MEDICATION ERRORS
   • Report any medication error immediately to the charge nurse and supervisor.
   • Complete a medication error incident report per facility policy.
   • Notify the attending physician within 1 hour.
   • Monitor resident for adverse effects and document observations.
   • No disciplinary action will be taken for good-faith error reporting.

5. CONTROLLED SUBSTANCE MANAGEMENT
   • Count controlled substances at every shift change with two nurses present.
   • Discrepancies must be reported to the supervisor immediately.
   • Store controlled substances in double-locked cabinet at all times.
   • Document all wastage with witness signature.`,
      references: "42 CFR §483.45 — Pharmacy Services\nCMS F-Tag F755 — Pharmacy Services\nFlorida Statute §400.022 — Residents' Rights\nFlorida Statutes §§464.2035, 400.211(5) — QMA Requirements"
    }
  },
  infection: {
    title: "Infection Prevention & Control Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Infection Preventionist / Director of Nursing",
    sections: {
      purpose: "To establish an infection prevention and control program that protects residents, staff, and visitors from healthcare-associated infections (HAIs) and communicable diseases, in full compliance with 42 CFR §483.80.",
      scope: "This policy applies to all employees, contractors, volunteers, and visitors at this facility. Compliance is mandatory. This policy meets the CMS Conditions of Participation requirement for a written Infection Prevention and Control Program.",
      procedure: `1. HAND HYGIENE (PRIMARY INTERVENTION)
   • Perform hand hygiene using soap and water (≥20 seconds) or alcohol-based hand rub (ABHR) before and after every resident contact, after removing gloves, after contact with potentially contaminated surfaces, and before and after eating.
   • Use soap and water (not ABHR) when hands are visibly soiled or after caring for residents with C. difficile.

2. STANDARD PRECAUTIONS
   • Apply Standard Precautions to ALL residents regardless of known diagnosis.
   • Use appropriate PPE (gloves, gown, mask, eye protection) based on anticipated exposure to blood, body fluids, or secretions.
   • Change gloves between residents; perform hand hygiene after glove removal.

3. TRANSMISSION-BASED PRECAUTIONS
   • Contact Precautions: Gloves and gown required upon room entry (MRSA, C. diff, wound infections).
   • Droplet Precautions: Surgical mask required within 3 feet (influenza, respiratory infections).
   • Airborne Precautions: N95 respirator required; negative pressure room if available (TB, COVID-19 per current guidance).
   • Post precaution signs on room door. Remove PPE before exiting room.

4. EQUIPMENT & ENVIRONMENT
   • Clean and disinfect shared equipment between every resident use using EPA-registered disinfectant.
   • Follow facility's cleaning schedule for high-touch surfaces.
   • Handle soiled linens without shaking; place in designated laundry bags.

5. REPORTING
   • Report signs of infection (fever, change in mental status, new wound drainage, respiratory symptoms) to charge nurse promptly.
   • Document signs and symptoms in nursing notes.
   • The facility's Infection Preventionist must be notified of suspected outbreaks (2+ residents with similar symptoms within 72 hours).`,
      references: "42 CFR §483.80 — Infection Control (Mandatory)\n42 CFR §483.95(e) — Mandatory Infection Control Training\nCMS F-Tag F880 — Infection Prevention & Control Program\nCDC Guidelines for Isolation Precautions (2007, updated)\nFlorida Statute §400.23"
    }
  },
  wound: {
    title: "Wound Care & Pressure Injury Prevention Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Director of Nursing / Wound Care Nurse",
    sections: {
      purpose: "To prevent the development of pressure injuries and other wounds in facility residents, and to ensure timely identification, accurate staging, appropriate treatment, and thorough documentation of all wound conditions.",
      scope: "This policy applies to all nursing staff involved in direct resident care. Wound assessments must be performed by a licensed nurse. CNAs provide wound prevention care and must report any skin changes to a licensed nurse immediately.",
      procedure: `1. PRESSURE INJURY PREVENTION
   • Complete skin assessment on admission and weekly thereafter using the Braden Scale.
   • Reposition high-risk residents every 2 hours per turning schedule; document each turn.
   • Use pressure-redistributing mattress overlays or specialty mattresses for Braden scores ≤18.
   • Apply heel protectors and offload heels for all bed-bound residents.
   • Maintain skin clean and dry; apply moisture barrier cream for incontinent residents.
   • Ensure adequate nutrition and hydration; involve dietitian for residents at nutritional risk.

2. WOUND ASSESSMENT (Licensed Nurse)
   • Assess all wounds weekly at minimum and document using the facility wound assessment form.
   • Document: location, stage/classification, size (L × W × D in cm), wound bed appearance, exudate (amount, type, odor), periwound skin condition, and pain level.
   • Photograph wound weekly with measurement scale visible.

3. PRESSURE INJURY STAGING (NPUAP Classification)
   • Stage 1: Non-blanchable redness, intact skin.
   • Stage 2: Partial-thickness skin loss, exposed dermis, may appear as blister.
   • Stage 3: Full-thickness skin loss, subcutaneous tissue visible.
   • Stage 4: Full-thickness skin/tissue loss, bone/tendon/muscle exposed.
   • Unstageable: Covered by slough or eschar — do not remove to stage.
   • Deep Tissue Injury (DTI): Persistent non-blanchable deep red/maroon discoloration.

4. WOUND CARE PROCEDURES (CNA Role)
   • Report any new redness, skin breakdown, or open areas to charge nurse immediately.
   • Assist with turning and repositioning per care plan.
   • Apply clean gloves before handling wound dressings (do not change dressings without order).
   • Maintain sterile technique when assisting licensed nurse with dressing changes.

5. DOCUMENTATION & REPORTING
   • Notify physician of any new pressure injury, wound deterioration, or signs of infection.
   • Report Stage 3, Stage 4, and unstageable pressure injuries to AHCA as required by state law.
   • Family notification required for all new pressure injuries.`,
      references: "42 CFR §483.25(b) — Quality of Care: Pressure Ulcers\nCMS F-Tag F686 — Treatment/Services to Prevent/Heal Pressure Ulcers\nNational Pressure Injury Advisory Panel (NPIAP) Staging System\nFlorida Statute §400.23 — AHCA Reporting Requirements"
    }
  },
  dementia: {
    title: "Dementia & Cognitive Impairment Care Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Director of Nursing",
    sections: {
      purpose: "To ensure that all staff provide compassionate, safe, and person-centered care to residents with dementia and other cognitive impairments, in accordance with 42 CFR §483.95(g)(2) and best practices in dementia care.",
      scope: "This policy applies to all staff who interact with residents diagnosed with Alzheimer's disease, vascular dementia, Lewy body dementia, frontotemporal dementia, or any other cognitive impairment. This is a FEDERALLY MANDATED training area.",
      procedure: `1. PERSON-CENTERED COMMUNICATION
   • Always approach the resident from the front and at eye level.
   • Identify yourself by name and role on every interaction.
   • Use the resident's preferred name as documented in the care plan.
   • Speak slowly, clearly, and in simple sentences (one idea at a time).
   • Allow adequate time for the resident to process and respond — do not rush.
   • Use a calm, warm, reassuring tone at all times.

2. BEHAVIORAL EXPRESSIONS & DE-ESCALATION
   • Recognize that behavioral expressions (agitation, resistance, wandering, verbal aggression) represent unmet needs, not intentional misconduct.
   • When a resident becomes agitated: stop the current activity, ensure safety, speak calmly, identify possible triggers (pain, hunger, toileting, overstimulation, fear).
   • Use validation techniques: acknowledge feelings without arguing or correcting.
   • Redirect to a preferred activity or a calm, familiar topic.
   • Never argue with, shame, or correct a resident about their perception of reality.
   • Document effective de-escalation techniques in the care plan.

3. SUNDOWNING MANAGEMENT
   • Anticipate increased confusion and agitation in late afternoon/evening hours.
   • Implement environmental modifications: consistent lighting, reduced noise, familiar objects.
   • Maintain a consistent daily routine — changes in schedule can increase distress.
   • Offer preferred snacks or activities during peak sundowning hours.
   • Document time of day and specific triggers in nursing notes.

4. WANDERING & ELOPEMENT PREVENTION
   • Assess elopement risk on admission and document in care plan.
   • Ensure door alarms and wander management devices are functioning.
   • Report any actual or attempted elopement to the supervisor immediately.
   • Do not physically restrain a wandering resident unless imminent danger exists.

5. DOCUMENTATION
   • Document behavioral incidents including time, trigger, response, and outcome.
   • Update care plan with effective interventions within 24 hours of new behavioral pattern.
   • Communicate changes in cognitive status to charge nurse and physician.`,
      references: "42 CFR §483.95(g)(2) — MANDATORY: Dementia Management Training\n42 CFR §483.40 — Behavioral Health Services\nCMS F-Tag F758 — Free from Unnecessary Psychotropic Medications\nAlzheimer's Association — Dementia Care Practice Recommendations\nFlorida Statute §430.5025 — ADRD Training Requirements"
    }
  },
  abuse: {
    title: "Abuse, Neglect & Exploitation Prevention Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Administrator / Director of Nursing",
    sections: {
      purpose: "To establish a zero-tolerance policy for all forms of resident abuse, neglect, and exploitation; to ensure that all staff understand their mandatory reporting obligations; and to create a culture of safety and accountability consistent with 42 CFR §483.12 and §483.95.",
      scope: "This policy applies to ALL facility employees, contractors, volunteers, and visitors without exception. All staff are mandatory reporters under Florida law. This is a FEDERALLY MANDATED training area per 42 CFR §483.95.",
      procedure: `1. DEFINITIONS (42 CFR §483.12)
   • ABUSE: The willful infliction of injury, unreasonable confinement, intimidation, or punishment. Includes physical, verbal, sexual, and mental/emotional abuse.
   • NEGLECT: Failure to provide goods and services necessary to avoid physical harm, mental anguish, or mental illness — including unintentional neglect.
   • EXPLOITATION: Taking advantage of a resident for personal gain, including misappropriation of money, property, or resources.
   • MISAPPROPRIATION: Deliberate misplacement, exploitation, or wrongful use of a resident's property.

2. ZERO-TOLERANCE POLICY
   • This facility maintains a strict zero-tolerance policy for all forms of resident abuse, neglect, and exploitation.
   • Any employee found to have committed abuse, neglect, or exploitation will be subject to immediate termination and referral to law enforcement and licensing authorities.
   • Employment does not protect any person from prosecution under applicable law.

3. MANDATORY REPORTING OBLIGATIONS
   • ALL staff are mandatory reporters — this obligation exists regardless of your role, seniority, or whether you witnessed the incident directly.
   • Alleged violations involving abuse OR resulting in serious bodily injury must be reported to the administrator WITHIN 2 HOURS.
   • All other alleged violations must be reported to the administrator WITHIN 24 HOURS.
   • Additionally, reports must be made to:
     – Florida AHCA: 1-888-419-3456
     – Adult Protective Services (APS): 1-800-962-2873
     – Long-Term Care Ombudsman: 1-888-831-0404
   • You may also report directly to these agencies if you feel internal reporting is not being acted upon.

4. NON-RETALIATION POLICY
   • No employee will face disciplinary action, demotion, or termination for making a good-faith report of suspected abuse or neglect.
   • Retaliation against any reporter is itself a terminable offense and may be a criminal violation.
   • If you believe you are being retaliated against, report immediately to the administrator or directly to AHCA.

5. WARNING SIGNS TO REPORT IMMEDIATELY
   • Unexplained bruises, burns, or injuries
   • Resident appearing fearful, withdrawn, or anxious around specific staff
   • Sudden weight loss or signs of dehydration
   • Poor hygiene or unchanged clothing
   • Resident reports of abuse, even if memory-impaired
   • Missing personal belongings or money
   • Staff observed speaking harshly to, threatening, or demeaning a resident`,
      references: "42 CFR §483.12 — Freedom from Abuse, Neglect, and Exploitation (MANDATORY)\n42 CFR §483.95(b)(c) — MANDATORY: Abuse/Neglect Training\nCMS F-Tag F600 — Free from Abuse and Neglect\nFlorida Statute §415.1034 — Mandatory Reporting of Vulnerable Adults\nFlorida Statute §400.022 — Resident Rights"
    }
  }
};


// Auto-generate a policy for any topic not in DEFAULT_POLICIES
function buildAutoPolicy(t) {
  return {
    title: t.label + " Policy",
    effectiveDate: "2026-01-01",
    reviewDate: "2027-01-01",
    approvedBy: "Director of Nursing",
    sections: {
      purpose: "To ensure all staff are knowledgeable about " + t.label + " and implement evidence-based practices that protect resident safety, uphold regulatory requirements, and promote quality of care consistent with " + t.cmsRef + ".",
      scope: "This policy applies to all nursing staff (RNs, LPNs, CNAs) and any personnel involved in resident care at this facility. Compliance is mandatory for all assigned staff.",
      procedure: t.learningPoints.map((pt, i) => (i+1) + ". " + pt).join("\n\n"),
      references: t.cmsRef + "\nFlorida Statute \u00a7400.23 \u2014 Rules; Evaluation and Deficiencies\nFlorida Administrative Code 59A-4 \u2014 Nursing Home Standards\nFacility Policies and Procedures Manual"
    }
  };
}

function buildAllPolicies(topics) {
  const result = JSON.parse(JSON.stringify(DEFAULT_POLICIES));
  topics.forEach(t => {
    if (!result[t.id]) result[t.id] = buildAutoPolicy(t);
  });
  return result;
}

  { id:"dementia", label:"Dementia & Cognitive Care", icon:"🧠", mandatory:true, color:"#5d4e37", accent:"#c8a95e", estimatedHours:2, cmsRef:"42 CFR §483.95(g)(2) — MANDATORY",
    learningPoints:["Dementia is not a normal part of aging — it is a progressive neurological condition affecting memory, judgment, and behavior","Use person-centered communication: speak slowly, use simple sentences, maintain eye contact","Approach from the front, identify yourself, and use the resident's preferred name","Validate feelings rather than correcting — redirection is more effective than argument","Recognize behavioral expressions (agitation, wandering, sundowning) as unmet needs","Respond to behaviors by identifying triggers: pain, hunger, boredom, environmental overstimulation","Ensure a safe environment: secured exits, reduced hazards, consistent routine","Document behavioral changes and effective interventions in the care plan"],
    questions:[{q:"A resident with dementia insists it is 1965 and they need to go to work. The BEST response is:",options:["Firmly tell them the year is 2026 and they are retired","Validate their feelings and gently redirect with a meaningful activity","Ignore the statement and walk away","Give them a task to complete as if they were going to work"],correct:1},{q:"Sundowning refers to:",options:["A resident who sleeps during the day","Increased confusion, agitation, or restlessness in the late afternoon/evening","A resident who refuses meals at dinner","Wandering behavior that only occurs outdoors"],correct:1},{q:"When approaching a resident with dementia, you should:",options:["Approach quickly from behind to avoid startling them","Approach from the front, make eye contact, and identify yourself","Raise your voice so they can hear you clearly","Avoid eye contact to reduce overstimulation"],correct:1},{q:"A resident with dementia becomes agitated during bathing. Your FIRST response should be:",options:["Restrain them to complete the task quickly","Stop, assess for unmet needs (pain, fear, cold), and try a different approach","Document that the resident refused and skip bathing","Ask another staff member to hold them still"],correct:1},{q:"Per 42 CFR §483.95(g)(2), dementia management training is:",options:["Optional for facilities with fewer than 20 residents","Mandatory and must be included in annual in-service training for nurse aides","Only required for staff assigned to memory care units","Required only when a new dementia resident is admitted"],correct:1}],
    checklist:["Can identify stages and symptoms of dementia progression","Uses person-centered communication techniques","Approaches residents from the front and identifies self","Validates feelings and uses redirection rather than correction","Identifies behavioral triggers and documents effective interventions","Knows facility protocol for wandering and elopement prevention","Understands sundowning and environmental modifications to reduce it","Documents behavioral changes accurately in care notes"] },
  { id:"abuse", label:"Abuse & Neglect Prevention", icon:"🛡️", mandatory:true, color:"#2c3e50", accent:"#e74c3c", estimatedHours:2, cmsRef:"42 CFR §483.95(b)(c) & §483.12 — MANDATORY",
    learningPoints:["Abuse includes physical, verbal, sexual, mental, and financial abuse — all are prohibited under 42 CFR §483.12","Neglect means failure to provide care that causes or could cause harm — including unintentional neglect","Exploitation includes misusing a resident's money, property, or resources","ALL staff are mandatory reporters — you are legally required to report any suspected abuse or neglect","Report suspected abuse IMMEDIATELY to the facility administrator — within 2 hours if abuse/serious injury, 24 hours otherwise","Never retaliate against a resident or staff member who makes a good-faith report","Vulnerable signs: unexplained bruises, withdrawal, fearfulness, poor hygiene, weight loss","You may also report directly to AHCA, Adult Protective Services, or the Long-Term Care Ombudsman"],
    questions:[{q:"Which of the following is an example of NEGLECT?",options:["Shouting at a resident who is confused","Failing to turn a resident per care plan, resulting in a pressure injury","Taking money from a resident's purse","Touching a resident inappropriately"],correct:1},{q:"Under 42 CFR §483.12(c)(1), alleged abuse involving serious bodily injury must be reported to the facility administrator within:",options:["24 hours","2 hours","48 hours","The end of your shift"],correct:1},{q:"You observe a coworker yelling at and threatening a resident. You should:",options:["Speak to the coworker privately and ask them to stop","Report it immediately to your supervisor or the administrator","Document it in your personal notes and monitor the situation","Do nothing — it is not your responsibility"],correct:1},{q:"A resident has unexplained bruising and seems fearful around one staff member. This should be:",options:["Noted internally and monitored for a week","Reported immediately as a suspected abuse incident","Assumed to be from the resident's fall history","Discussed only with that staff member"],correct:1},{q:"As a mandatory reporter, if you suspect abuse you:",options:["Must report only if you witnessed it directly","Are legally required to report it regardless of certainty","Should wait until you have proof before reporting","Only report it if the resident asks you to"],correct:1}],
    checklist:["Can define physical, verbal, sexual, mental, and financial abuse","Understands the definition of neglect and exploitation under §483.12","Knows mandatory reporting obligations and timelines (2-hour / 24-hour rule)","Knows how to report to facility administrator AND external agencies (AHCA, APS, Ombudsman)","Understands zero-tolerance policy for retaliation against reporters","Can identify warning signs of abuse or neglect in residents","Knows the facility's written abuse prevention policies and procedures","Has reviewed and signed the facility's abuse prevention attestation this year"] }
,
  { id:"risk_mgmt", label:"Risk Management", icon:"⚠️", mandatory:false, color:"#7b3f00", accent:"#e67e22", estimatedHours:1.5, cmsRef:"42 CFR §483.75 / CMS QSO-19-08-NH",

  { id:"code_drill", label:"Code Drill", icon:"🚨", mandatory:false, color:"#7b0000", accent:"#e74c3c", estimatedHours:1, cmsRef:"42 CFR §483.73 / NFPA 101 Life Safety Code",

      {q:"You hear 'Code Blue' announced. If you are CPR-certified, your role is to:",options:["Immediately leave the area to avoid liability","Respond to the room, assess, and initiate CPR if indicated while calling for AED","Continue your current task until told otherwise","Notify families at the nurse's station"],correct:1},
      {q:"A resident is missing from their room and cannot be located. This activates:",options:["Code Red","Code Blue","Code Silver","Code Grey"],correct:2},

  { id:"qapi", label:"QAPI for Healthcare Staff", icon:"📈", mandatory:false, color:"#003366", accent:"#2980b9", estimatedHours:1.5, cmsRef:"42 CFR §483.75 — MANDATORY QAPI Program",

      "CMS Five-Star Quality Rating is directly influenced by QAPI outcomes including staffing, health inspections, and quality measures",
      "All PIPs must be documented, measurable, and evaluated for effectiveness over time"

      {q:"Which of the following is an example of a Performance Improvement Project (PIP)?",options:["Reviewing incident reports monthly","A 90-day structured project to reduce catheter-associated UTIs by 20%","Auditing MARs for missed signatures","Reviewing complaints at the end of each quarter"],correct:1},
      {q:"Under 42 CFR §483.75, a QAPI program in a skilled nursing facility is:",options:["Optional for facilities with fewer than 60 beds","Mandatory and must be ongoing and comprehensive","Required only during survey periods","Only the responsibility of the administrator and DON"],correct:1},
      {q:"As a frontline staff member, your role in QAPI includes:",options:["Developing policy documents for administration","Attending board meetings to review data","Reporting care concerns and participating in PIPs when asked","Conducting chart audits independently"],correct:2},

  { id:"advance_directives", label:"Advance Directives", icon:"📋", mandatory:false, color:"#1a4a3a", accent:"#27ae60", estimatedHours:1.5, cmsRef:"42 CFR §483.10(g)(14) / Patient Self-Determination Act (PSDA)",

      "A DNR order must be immediately available and followed during a code — check the care plan and MDS",
      "Families do NOT override a resident's valid advance directive — the resident's documented wishes take precedence",

    checklist:["Can define advance directive, living will, healthcare surrogate, and DNR","Knows the Patient Self-Determination Act requirement upon admission","Understands Florida POLST form and how it functions as a medical order","Knows where advance directives are stored in the resident's record","Understands that a valid advance directive cannot be overridden by family","Would immediately follow a DNR order during a code situation","Would never pressure a resident about their advance directive choices","Can explain how to document presence/absence of advance directives"]

  { id:"fire_safety", label:"Fire Safety", icon:"🔥", mandatory:false, color:"#8b0000", accent:"#e74c3c", estimatedHours:1.5, cmsRef:"42 CFR §483.73 / NFPA 101 Life Safety Code / FL Statute §633",

      {q:"During a fire emergency, why should you close doors?",options:["To prevent residents from leaving their rooms","Closed doors contain smoke and fire, buying critical time for evacuation","Because it is required by NFPA but has no practical benefit","To prevent staff from entering dangerous areas"],correct:1},
      {q:"R.A.C.E. stands for:",options:["Run, Alert, Call, Escape","React, Assess, Contain, Evacuate","Rescue, Alarm, Confine, Extinguish/Evacuate","Report, Act, Control, Exit"],correct:2},
      {q:"The preferred evacuation method in most LTC fire events is:",options:["Vertical evacuation — use elevators immediately","Horizontal evacuation — move to the other side of fire doors on the same floor","Full facility evacuation — move everyone outside","Shelter in place — lock all residents in rooms"],correct:1},

    checklist:["Can explain R.A.C.E. in correct order","Can demonstrate P.A.S.S. technique for fire extinguisher use","Knows location of all fire pull stations on their unit","Knows location of all fire extinguishers on their unit","Knows location of oxygen shut-offs on their unit","Knows facility's evacuation plan and horizontal evacuation routes","Knows assembly point for residents and staff after evacuation","Has participated in at least one fire drill in the past 12 months"]

  { id:"resident_rights", label:"Resident Rights", icon:"⚖️", mandatory:true, color:"#1a3a6b", accent:"#5dade2", estimatedHours:2, cmsRef:"42 CFR §483.10 — MANDATORY",

      "Residents have the right to voice grievances without fear of retaliation — staff must take complaints seriously and report them",

      "Residents have the right to manage their own finances and visitors, and to communicate freely with anyone they choose"

    checklist:["Can list at least 8 resident rights under 42 CFR §483.10","Understands the right to dignity, respect, and privacy in daily care","Knows the right to self-determination and making personal choices","Understands freedom from restraints — physical and chemical","Knows the right to file grievances without retaliation","Knows where to find the facility's resident rights policy and posting","Understands how to honor rights while maintaining safety","Has attended resident rights training within the past 12 months"]

  { id:"infection_prevention", label:"Infection Prevention Precautions", icon:"🦠", mandatory:true, color:"#1a4a7a", accent:"#2980b9", estimatedHours:2, cmsRef:"42 CFR §483.80 — MANDATORY / CDC Transmission-Based Precautions",

      "C. diff requires soap and water for hand hygiene — alcohol-based hand rubs do NOT kill C. diff spores",
      "Isolation signage must be posted and PPE donned BEFORE entering the room — doff BEFORE exiting",
      "Report any breach in infection control immediately to the charge nurse and infection preventionist"
    ],

  { id:"fall_mgmt", label:"Fall Management", icon:"🦺", mandatory:false, color:"#1a6b4a", accent:"#27ae60", estimatedHours:1.5, cmsRef:"42 CFR §483.25(d) / CMS F689 / AHRQ Fall Prevention Toolkit",
    learningPoints:[
      "Falls are the leading cause of injury-related death in adults over 65 and a top CMS citation in nursing facilities (CMS F689)",
      "Intrinsic risk factors: history of falls, gait/balance disorders, muscle weakness, polypharmacy (especially psychotropics/diuretics), vision impairment, cognitive impairment",
      "Extrinsic risk factors: wet floors, poor lighting, improper footwear, bed height, absent or broken assistive devices",
      "Fall risk assessment tools (Morse, STRATIFY, Hendrich II) must be completed on admission, quarterly, and after every fall",
      "Post-fall assessment: assess for injury, notify charge nurse, do NOT move resident until assessed, complete incident report within required timeframe",
      "Root Cause Analysis after falls identifies system factors — staffing, environment, equipment, communication",
      "Least restrictive interventions first: scheduled toileting, call light accessibility, medication review, appropriate footwear, hip protectors",
      "NEVER use physical restraints to prevent falls — they increase injury risk and violate resident rights"
    ],
    questions:[
      {q:"After a resident fall, before moving the resident, you must:",options:["Complete the incident report","Call the family","Assess the resident for injury and notify the charge nurse","Help them back to bed immediately to restore dignity"],correct:2},

      {q:"CMS F689 specifically addresses which fall-related requirement?",options:["Facilities must install carpet in all resident rooms","Facilities must assess fall risk and implement individualized interventions to prevent falls","All falls must be reported to CMS within 24 hours","Residents must wear non-slip shoes at all times"],correct:1},
      {q:"Using physical restraints to prevent falls:",options:["Is an acceptable last resort intervention","Increases injury risk and violates resident rights under 42 CFR §483.12","Is permitted with a physician order","Is encouraged by CMS when fall history is severe"],correct:1},
      {q:"Fall risk assessment using a validated tool (Morse, Hendrich II) should be completed:",options:["Annually only","On admission only","On admission, quarterly, and after every fall event","Only when a fall occurs"],correct:2}
    ],
    checklist:["Can identify intrinsic and extrinsic fall risk factors","Knows facility's fall risk assessment tool and scoring thresholds","Knows post-fall response protocol — assess before moving resident","Has reviewed the care plans of at least 3 high-risk residents this week","Knows the difference between restraints and least-restrictive interventions","Understands that restraints are not an acceptable fall prevention strategy","Knows how to document a fall event accurately and objectively","Has participated in or reviewed the facility's last fall-related RCA"]
  },

  { id:"communication", label:"Communication Basics", icon:"💬", mandatory:false, color:"#1a4a6b", accent:"#2980b9", estimatedHours:1, cmsRef:"42 CFR §483.10 / Person-Centered Care Standards",
    learningPoints:[

      "Non-verbal communication: body language, facial expressions, tone of voice, and physical proximity account for 70-93% of message delivery",

      "Therapeutic communication with residents: validation, open-ended questions, empathy, non-judgmental stance",

  { id:"grievance", label:"Grievance", icon:"📣", mandatory:false, color:"#2c3e50", accent:"#e74c3c", estimatedHours:1, cmsRef:"42 CFR §483.10(j) / CMS F585",

      "ANY staff member who receives a grievance is responsible for acknowledging it and directing it through the proper channel immediately",

      "Common grievance categories: care quality, staffing, food, roommate conflicts, stolen items, privacy violations, billing disputes",

      {q:"Retaliating against a resident for filing a grievance is:",options:["Acceptable if the grievance was unfounded","A serious violation of resident rights under 42 CFR §483.10","Permitted if the behavior caused disruption on the unit","Only prohibited for licensed staff members"],correct:1},

    ],
    checklist:["Knows the facility's grievance policy and reporting chain","Can acknowledge and document a verbal grievance received at bedside","Understands that both verbal and written grievances must be acknowledged","Knows the role of the Grievance Official in the facility","Would never retaliate or imply negative consequences for a grievance","Can provide the LTC Ombudsman contact information when requested","Understands the regulatory basis: 42 CFR §483.10(j) and CMS F585","Has reviewed facility's grievance log or last resolution report"]

  { id:"bloodborne", label:"Bloodborne Pathogens", icon:"🩸", mandatory:true, color:"#7b0000", accent:"#e74c3c", estimatedHours:1.5, cmsRef:"OSHA 29 CFR 1910.1030 — MANDATORY ANNUAL TRAINING",
    learningPoints:[
      "OSHA 29 CFR 1910.1030 requires annual bloodborne pathogen (BBP) training for all workers with potential occupational exposure",

      "Standard Precautions treat ALL blood and body fluids as potentially infectious — not just known cases",
      "Personal Protective Equipment (PPE) for BBP: gloves minimum; add gown, mask, face shield when splash risk exists",
      "Sharps safety: never recap used needles; use safety-engineered sharps devices; dispose in approved sharps containers",
      "Exposure incident protocol: immediately wash area (soap and water for punctures; flush mucous membranes with water), report to supervisor, complete incident report, seek immediate medical evaluation",
      "Hepatitis B vaccination is offered at no cost to employees — declining must be documented with signed declination form"
    ],
    questions:[

      {q:"Which bloodborne pathogen survives on environmental surfaces for up to 7 days?",options:["HIV","Hepatitis C (HCV)","Hepatitis B (HBV)","Influenza"],correct:2},
      {q:"After a needlestick injury, your FIRST action is:",options:["Call 911","Complete an incident report","Immediately wash the puncture site with soap and water and report to your supervisor","Apply a tourniquet to prevent spread"],correct:2},
      {q:"Standard Precautions require you to treat blood and body fluids from:",options:["Only confirmed HIV/HBV-positive residents as infectious","All residents as potentially infectious, regardless of diagnosis","Only residents with visible signs of infection as infectious","Only residents in isolation rooms as infectious"],correct:1},
      {q:"Hepatitis B vaccine must be offered to employees:",options:["At employee expense after a 90-day waiting period","At no cost to the employee, prior to potential occupational exposure","Only if the employee has had a prior exposure","Annually as a booster regardless of prior vaccination"],correct:1}

  { id:"pressure_ulcer", label:"Pressure Ulcer/Injury", icon:"🩹", mandatory:false, color:"#8b2020", accent:"#c0392b", estimatedHours:2, cmsRef:"42 CFR §483.25(b) / CMS F686 / NPUAP/EPUAP Staging Guidelines",
    learningPoints:[
      "Pressure injuries (formerly pressure ulcers) result from sustained pressure, shear, and/or friction over bony prominences causing tissue ischemia",
      "CMS F686 requires facilities to ensure residents do not develop pressure injuries that were avoidable, and to treat existing injuries to promote healing",
      "NPUAP/EPUAP Staging: Stage 1 (non-blanchable redness, skin intact) → Stage 2 (partial-thickness skin loss) → Stage 3 (full-thickness tissue loss) → Stage 4 (exposed bone/tendon/muscle) → Unstageable → Deep Tissue Pressure Injury (DTPI)",
      "Most common locations: sacrum/coccyx, heels, trochanters, lateral malleoli, occiput",
      "Prevention: repositioning every 2 hours per care plan, pressure-redistribution surfaces, adequate nutrition/hydration, moisture management, early ambulation",
      "Moisture-associated skin damage (MASD) is often confused with pressure injuries — both require prevention but different management",
      "Never massage reddened bony prominences — this increases tissue damage",
      "All new pressure injuries must be reported to the charge nurse, documented, photographed per protocol, and a wound care consult initiated"
    ],
    questions:[
      {q:"A Stage 2 pressure injury is characterized by:",options:["Intact skin with non-blanchable erythema","Partial-thickness skin loss exposing the dermis (pink/red wound bed)","Full-thickness skin loss with visible subcutaneous fat","Exposed bone, tendon, or muscle"],correct:1},
      {q:"Repositioning to prevent pressure injuries should occur:",options:["Every 4 hours","Every 8 hours","Per the resident's individualized care plan (typically every 2 hours)","Only when the resident reports discomfort"],correct:2},
      {q:"When you notice non-blanchable redness over a resident's coccyx, you should:",options:["Massage the area to increase circulation","Cover it with a dry gauze dressing","Report it to the charge nurse immediately and document","Wait to see if it resolves with the next repositioning"],correct:2},
      {q:"CMS F686 holds facilities responsible for ensuring pressure injuries are:",options:["Treated with only approved wound care products","Not avoidable, and existing wounds are treated to promote healing","Reported to CMS within 24 hours of identification","Staged only by wound care nurses"],correct:1},
      {q:"Deep Tissue Pressure Injury (DTPI) typically presents as:",options:["A shallow open wound with red wound bed","A black, brown, or purple area of intact skin with possible blood-filled blister","Stage 3 with visible subcutaneous fat","An unstageable wound covered with black eschar"],correct:1}
    ],
    checklist:["Can describe all NPUAP/EPUAP pressure injury stages with characteristics","Knows the most common anatomical locations for pressure injuries","Knows that repositioning per care plan (typically Q2H) is primary prevention","Knows never to massage reddened bony prominences","Can differentiate pressure injuries from moisture-associated skin damage","Knows to report new skin breakdown immediately to the charge nurse","Documents pressure injury assessments accurately including size, stage, drainage","Has reviewed facility's skin integrity and wound care prevention protocol"]
  },

  { id:"ltc_safety", label:"Safety in the Long-Term Care Setting", icon:"🦺", mandatory:false, color:"#1a4a1a", accent:"#27ae60", estimatedHours:1.5, cmsRef:"42 CFR §483.25 / OSHA General Industry Standards / CMS Life Safety Conditions",

    checklist:["Can describe at least 5 environmental safety hazards in their work area","Knows safe patient handling policy — when mechanical lift is required","Can describe proper body mechanics for lifting and repositioning","Knows location of SDS binder and how to access a Safety Data Sheet","Would immediately report electrical hazards to maintenance","Knows the chemical mixing prohibition: bleach + ammonia = toxic gas","Understands the importance of reporting near-miss events","Has completed or scheduled safe patient handling/ergonomics training"]

  { id:"trauma_care", label:"Trauma-Informed Care: A Change in Perspective", icon:"💙", mandatory:false, color:"#1a3a5c", accent:"#5dade2", estimatedHours:1.5, cmsRef:"SAMHSA Trauma-Informed Care / CMS Person-Centered Care / 42 CFR §483.10",
    learningPoints:[
      "Trauma is any experience that overwhelms a person's ability to cope — physical, sexual, emotional abuse; grief; combat; natural disaster; systemic oppression",
      "SAMHSA estimates 70% of adults have experienced at least one traumatic event; many elderly residents have complex, layered trauma histories",
      "Trauma-Informed Care (TIC) has 4 core principles: Realize the widespread impact of trauma, Recognize signs and symptoms, Respond by integrating knowledge into practice, Resist re-traumatization",
      "Common triggers in LTC: bathing (especially for sexual trauma survivors), undressing, nighttime care, unexpected touch, loud environments",
      "TIC reframes behavior: 'What happened to you?' replaces 'What is wrong with you?'",
      "Signs of trauma response: flashbacks, hypervigilance, avoidance, agitation, dissociation, emotional dysregulation",
      "TIC strategies: always ask permission before touch, explain care before providing it, give choices, establish trust through routine and consistency",
      "Staff secondary trauma (compassion fatigue) is real — facilities should provide staff support and wellness resources"
    ],
    questions:[
      {q:"The core reframing question in Trauma-Informed Care is:",options:["'What is wrong with you?'","'Why are you behaving this way?'","'What happened to you?'","'What do you need right now?'"],correct:2},
      {q:"SAMHSA's 4 R's of Trauma-Informed Care include all EXCEPT:",options:["Realize","Recognize","Respond","Record"],correct:3},
      {q:"A resident who is a sexual abuse survivor becomes extremely agitated during bathing. A TIC response would be:",options:["Restrain them to complete essential hygiene care quickly","Continue quickly to minimize the duration of distress","Stop, acknowledge their distress, ask permission, offer choices, and try a modified approach","Document the refusal and bathe them at the next shift"],correct:2},
      {q:"Which of the following is a common trauma trigger in LTC settings?",options:["Access to personal belongings","Scheduled mealtimes","Nighttime care, bathing, and unexpected touch","Participation in group activities"],correct:2},
      {q:"Secondary trauma or compassion fatigue in LTC staff:",options:["Is not a recognized occupational health concern","Only affects mental health staff","Is a real risk for all caregiving staff and requires organizational support","Can be fully prevented through better time management"],correct:2}
    ],
    checklist:["Can define trauma and explain the 4 R's of TIC (SAMHSA)","Understands that 70% of adults have experienced at least one traumatic event","Can identify common LTC care triggers for trauma responses","Asks permission before touch and explains care before providing it","Reframes behavior using 'What happened to you?' lens","Knows how to modify personal care for trauma survivors","Recognizes signs of compassion fatigue in themselves and colleagues","Has reviewed facility's trauma-informed care policy or training materials"]
  },

  { id:"dehydration", label:"Dehydration Prevention", icon:"💧", mandatory:false, color:"#1a5c8b", accent:"#3498db", estimatedHours:1.5, cmsRef:"42 CFR §483.25(g) / CMS F692 / CMS F695",
    learningPoints:[

      "Signs of dehydration: dark concentrated urine (target pale yellow), dry mouth, sunken eyes, decreased skin turgor, confusion, dizziness, decreased urine output",

      "Offer fluids consistently throughout the day — with meals, medications, activities, and during rounds",
      "Know each resident's fluid restrictions or thickened liquid orders — follow the care plan",
      "Encourage fluids in a person-centered way: offer preferred beverages, use adapted cups, offer foods with high water content (soups, gelatin, watermelon)",
      "Document intake and output per care plan requirements — notify charge nurse if a resident is consuming < 75% of their fluid goal"
    ],

      {q:"A resident's care plan specifies thickened liquids (nectar consistency). When offering a beverage, you should:",options:["Offer regular thin liquids if the resident prefers them","Follow the thickened liquid order — deviation creates aspiration risk","Give thin liquids at meals and thickened between meals","Only thicken liquids if the resident is showing signs of choking"],correct:1},
      {q:"CMS F692 specifically addresses which nutritional/hydration requirement?",options:["Weight monitoring protocols","Adequate nutrition and hydration for residents","Tube feeding documentation","Dietitian consultation timelines"],correct:1},

  { id:"feeding_eating", label:"Feeding and Eating Assistance", icon:"🍽️", mandatory:false, color:"#5c2d00", accent:"#e67e22", estimatedHours:1.5, cmsRef:"42 CFR §483.60 / CMS F803 / CMS Feeding Assistant Program §483.60(h)",

  { id:"mental_health_older", label:"Mental Health Disorders in Older Adults: Introduction", icon:"🧠", mandatory:false, color:"#4a0050", accent:"#8e44ad", estimatedHours:1.5, cmsRef:"42 CFR §483.25(b)(3) / CMS F758 (Psychotropic Medications) / CMS F740",

  { id:"nutrition_older", label:"Nutritional Promotion in the Older Adult", icon:"🥗", mandatory:false, color:"#1a5c1a", accent:"#27ae60", estimatedHours:1.5, cmsRef:"42 CFR §483.60 / CMS F803 / Dietary Reference Intakes (DRI)",
    learningPoints:[
      "Malnutrition is prevalent in LTC — up to 30-50% of nursing facility residents are malnourished or at risk",
      "Physiological factors contributing to malnutrition: reduced appetite, taste/smell changes, dental problems, dysphagia, reduced GI motility, polypharmacy",
      "Protein needs: older adults require 1.0–1.5g of protein per kg of body weight daily — higher than previously recommended (0.8g/kg)",
      "Vitamin D and calcium are critical for bone health; Vitamin B12 absorption decreases with age; dehydration risk is elevated",
      "CMS F803 requires that residents receive their prescribed diets and that nutritional needs are met per the individualized care plan",
      "MNA (Mini Nutritional Assessment) is a validated screening tool used to identify malnutrition risk in older adults",
      "Unintentional weight loss of ≥5% in 30 days or ≥10% in 6 months triggers mandatory care plan review and IDT evaluation",
      "Enrichment strategies: fortified foods, between-meal snacks, calorie-dense supplements, appetite stimulants per physician order"
    ],

async function api(action, params = {}, method = "GET") {
  const tok = window.__svToken || "";
  const url = method === "GET"
    ? `${API}?action=${action}&${new URLSearchParams(params)}`
    : `${API}?action=${action}`;
  const opts = method === "GET"
    ? { method: "GET", headers: {"X-Session-Token": tok} }
    : { method: "POST", headers: {"Content-Type":"application/json","X-Session-Token": tok}, body: JSON.stringify(params) };
  const r = await fetch(url, opts);
  const j = await r.json();
  if (j && j.error) throw new Error(j.error);
  return j;
}

function buildCompetencyReport(deployment, competency, staffRecords, donName, facilityName) {
  const date = new Date().toLocaleDateString("en-US",{year:"numeric",month:"long",day:"numeric"});
  const assigned = deployment.assignedTo === "all"
    ? staffRecords
    : staffRecords.filter(s => deployment.assignedIds?.includes(Number(s.id)));
  const rows = assigned.map(s => {
    const comp = deployment.completions?.[s.id];
    const itemsDone = comp ? Object.values(comp.items||{}).filter(Boolean).length : 0;
    const totalItems = competency.steps.length;
    return `<tr>
      <td>${s.name}</td>
      <td>${s.role}</td>
      <td style="text-align:center">${comp ? `<span style="color:green;font-weight:bold">✓ Complete</span>` : `<span style="color:#cc8800">Pending</span>`}</td>
      <td style="text-align:center">${comp ? `${itemsDone}/${totalItems}` : "—"}</td>
      <td style="text-align:center">${comp ? comp.date : "—"}</td>
      <td style="text-align:center">${comp ? (comp.method === "observed" ? "👁 Observed" : "📋 Self-Assessed") : "—"}</td>
      <td style="text-align:center">${comp ? (comp.validatedBy || "—") : "—"}</td>
      <td style="min-width:160px;border-top:1px solid #ccc;padding-top:20px;">&nbsp;</td>
    </tr>`;
  }).join("");
  const stepRows = competency.steps.map((step, i) =>
    `<tr><td style="text-align:center;width:30px">${i+1}</td><td>${step}</td>${assigned.map(s => {
      const comp = deployment.completions?.[s.id];
      const checked = comp?.items?.[i];
      return `<td style="text-align:center;width:60px">${checked ? "✓" : ""}</td>`;
    }).join("")}</tr>`
  ).join("");

  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${competency.title} Competency Sheet</title>
  <style>
    body{font-family:Arial,sans-serif;font-size:11px;color:#111;padding:24px}

    table{width:100%;border-collapse:collapse;margin-top:8px}
    th{background:#dce8f5;color:white;padding:7px 5px;font-size:10px;text-align:center}
    td{border:1px solid #ccc;padding:6px 5px;font-size:10px;vertical-align:middle}
    tr:nth-child(even){background:#f8f8f8}
    .meta{margin:14px 0;padding:11px;border:1px solid #ddd;border-radius:4px;background:#f9f9f9;font-size:11px;line-height:2}
    .method-badge{display:inline-block;padding:2px 7px;border-radius:10px;font-size:9px;font-weight:bold}
    .observed{background:#d4edda;color:#155724}.self{background:#cce5ff;color:#004085}
    .sig{margin-top:30px;display:flex;gap:50px}
    .sig-line{border-top:1px solid #333;padding-top:6px;min-width:180px;font-size:11px}
    @media print{button{display:none}.no-print{display:none}}
  </style>

  function buildMessage(type, staffMember, days) {

        return `Hi ${staffMember.name.split(" ")[0]}, you have ${staffMember.pending.length} inservice(s) pending at ${facilityName}: ${pending}. Please log in to complete them. Questions? Contact your supervisor.`;
      case "deadline":
        return `\u26a0\ufe0f ${staffMember.name.split(" ")[0]}, your inservice deadline at ${facilityName} is in ${days} day(s). Still pending: ${pending}. Complete ASAP to maintain compliance.`;
      case "confirmation":
        const done = Object.keys(staffMember.completions).map(id=>TOPICS.find(t=>t.id===id)?.label).slice(-1)[0];
        return `\u2705 Hi ${staffMember.name.split(" ")[0]}, your ${done||"inservice"} completion has been logged at ${facilityName}. Great work! ${staffMember.pending.length>0 ? staffMember.pending.length+" more pending." : "All inservices complete!"}`;

        return notifCustomMsg.replace("{name}", staffMember.name.split(" ")[0]).replace("{facility}", facilityName);

  // ── LANDING ──────────────────────────────────────────────────────────────────
  // ── REGISTRATION PENDING SCREEN ──────────────────────────────────────────────
  if(mode==="registration-pending") {

    // ── FACILITY LOGIN SCREEN ─────────────────────────────────────────────────────
  if(mode==="facility-login") {

    return (
      <div style={{...BG,display:"flex",alignItems:"center",justifyContent:"center",padding:"24px",minHeight:"100vh"}}>

          <p style={{color:"#6b87aa",fontSize:"14px",marginBottom:"28px",lineHeight:"1.6"}}>Please log in through the supervisor or staff portal to access this page.</p>

          <a href="staff.html" style={{display:"block",background:"rgba(37,99,192,0.08)",color:"#2563C0",padding:"12px",borderRadius:"10px",fontSize:"13px",fontWeight:"600",textDecoration:"none",border:"1.5px solid rgba(37,99,192,0.2)"}}>Staff Portal →</a>
        </div>
      </div>
    );

  // ── ADMIN LOGIN ───────────────────────────────────────────────────────────────
  if(mode==="admin-login") return (
    <div style={{...BG,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}}>
      <style>{CSS}</style>
      <div style={{maxWidth:"340px",width:"100%"}}>
        <div className="card" style={{padding:"36px",textAlign:"center"}}>
          <div style={{fontSize:"40px",marginBottom:"12px"}}>🔐</div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:"22px",color:"#bb8fce",marginBottom:"6px"}}>Supervisor Access</div>

          <input type="password" placeholder="••••" value={pinInput} onChange={e=>{setPinInput(e.target.value);setPinError(false);}} onKeyDown={e=>e.key==="Enter"&&adminLogin()} style={{marginBottom:"10px",textAlign:"center",letterSpacing:"8px",fontSize:"22px"}}/>

          <button className="btn" onClick={adminLogin} style={{background:"#9b59b6",color:"white",padding:"12px",borderRadius:"8px",fontSize:"14px",width:"100%",marginBottom:"10px"}}>Login →</button>
          <button className="btn" onClick={()=>window.location.href="supervisor.html"} style={{background:"rgba(255,255,255,.07)",color:"rgba(26,58,107,.5)",padding:"10px",borderRadius:"8px",fontSize:"13px",width:"100%"}}>← Back</button>
        </div>
      </div>
    </div>
  );

  // ── ADMIN DASHBOARD ───────────────────────────────────────────────────────────
  if(mode==="admin") return (
    <div style={BG}>
      <style>{CSS}</style>
      {/* header */}
      <div style={{background:"rgba(0,0,0,.45)",borderBottom:"1px solid rgba(155,89,182,.3)",padding:"12px 22px",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"12px"}}>
          <div style={{width:"5px",height:"30px",background:"linear-gradient(to bottom,#9b59b6,#6c3483)",borderRadius:"4px"}}/>
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"16px",fontWeight:"700",color:"#bb8fce"}}>Supervisor Admin Dashboard</div>
            <div style={{fontSize:"10px",color:"rgba(26,58,107,.32)",letterSpacing:"1.5px",textTransform:"uppercase"}}>{facilityName}</div>
          </div>
        </div>
        <div style={{display:"flex",gap:"8px",alignItems:"center",flexWrap:"wrap"}}>
          {mandatoryGaps>0 && <span className="pill pill-red">⚠ {mandatoryGaps} Mandatory Gaps</span>}

          <button className="btn" onClick={openReport} style={{background:"#2563C0",color:"#1A3A6B",padding:"7px 14px",borderRadius:"6px",fontSize:"12px"}}>📄 Export Report</button>
          <button className="btn" onClick={()=>window.location.href="supervisor.html"} style={{background:"rgba(255,255,255,.07)",color:"rgba(26,58,107,.4)",padding:"7px 12px",borderRadius:"6px",fontSize:"12px"}}>← Exit</button>
        </div>
      </div>

      <div style={{padding:"12px 22px",borderBottom:"1px solid rgba(255,255,255,.07)",display:"flex",gap:"7px",overflowX:"auto"}}>
        {[["overview","📊 Overview"],["staff","👥 Staff"],["assign","📋 Assign Inservices"],["pending",`🔔 Pending (${pendingSignoffs.length})`],["competencies",`🗂 Competencies (${deployedCompetencies.length})`],["meetings",`🎥 Meetings (${meetings.length})`],["notifications","📱 Notifications"],["manual",`📝 Manual Inservices (${manualInservices.length})`],["policies","📋 Policies"],["compliance","✅ Compliance"]].map(([id,label])=>(

        {/* OVERVIEW */}
        {adminTab==="overview" && (
          <div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:"12px",marginBottom:"24px"}}>
              {[{label:"Total Staff",value:totalStaff,icon:"👥",color:"#5dade2"},{label:"Fully Compliant",value:`${fullyCompliant}/${totalStaff}`,icon:"✅",color:"#27ae60"},{label:"Mandatory Gaps",value:mandatoryGaps,icon:"⚠️",color:mandatoryGaps>0?"#e74c3c":"#27ae60"},{label:"SMS Opted In",value:staffRecords.filter(s=>s.smsOptIn&&s.phone).length,icon:"📱",color:"#bb8fce"}].map(s=>(
                <div key={s.label} className="stat-card"><div style={{fontSize:"24px",marginBottom:"7px"}}>{s.icon}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:"26px",fontWeight:"700",color:s.color,marginBottom:"3px"}}>{s.value}</div><div style={{fontSize:"11px",color:"rgba(26,58,107,.45)"}}>{s.label}</div></div>
              ))}
            </div>
            {mandatoryGaps>0 && <div style={{background:"rgba(231,76,60,.12)",border:"1px solid rgba(231,76,60,.35)",borderRadius:"10px",padding:"14px 18px",marginBottom:"20px",fontSize:"13px",lineHeight:"1.7"}}><strong style={{color:"#e74c3c"}}>⚠ Mandatory Compliance Alert</strong><br/><span style={{color:"rgba(26,58,107,.7)"}}>{mandatoryGaps} staff missing at least one federally mandated topic. These must be completed before the next AHCA survey.</span></div>}

            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"12px",marginBottom:"24px"}}>
              {TOPICS.map(t=>{const pct=totalStaff>0?Math.round((staffRecords.filter(s=>s.completions[t.id]).length/totalStaff)*100):0;const avgSc=()=>{const sc=staffRecords.filter(s=>s.completions[t.id]).map(s=>s.completions[t.id].score);return sc.length?Math.round(sc.reduce((a,b)=>a+b,0)/sc.length):0;};return(

                    <span style={{fontSize:"11px",color:"rgba(26,58,107,.4)"}}>{staffRecords.filter(s=>s.completions[t.id]).length}/{totalStaff}</span>

                  <div style={{height:"5px",background:"rgba(255,255,255,.1)",borderRadius:"4px",marginBottom:"8px"}}><div style={{height:"100%",width:`${pct}%`,background:t.accent,borderRadius:"4px"}}/></div>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:"11px",color:"rgba(26,58,107,.42)"}}><span>{pct}% complete</span><span>Avg: <strong style={{color:t.accent}}>{avgSc()||"—"}%</strong></span></div>
                </div>
              );})}
            </div>
          </div>
        )}


        {/* ASSIGN INSERVICES */}
        {adminTab==="assign" && (()=>{
          const filteredStaff = staffRecords.filter(s =>
            assignFilterStaff==="all" ? true :
            assignFilterStaff==="none" ? ([...(s.pending||[]),...Object.keys(s.completions)].length===0) :
            assignFilterStaff==="partial" ? ([...(s.pending||[]),...Object.keys(s.completions)].length>0 && Object.keys(s.completions).length<TOPICS.length) : true
          );

          const toggleStaffTopic = (staffId, topicId) => {
            setStaffRecords(p=>p.map(s=>{
              if(s.id!==staffId) return s;
              const assigned = [...new Set([...(s.pending||[]),...Object.keys(s.completions)])];
              const isDone = !!s.completions[topicId];
              if(isDone) return s; // can't unassign completed
              const isAssigned = assigned.includes(topicId);
              const newPending = isAssigned
                ? (s.pending||[]).filter(id=>id!==topicId)
                : [...(s.pending||[]), topicId];
              return {...s, pending: newPending};
            }));
          };

          const assignTopicToAll = (topicId) => {
            setStaffRecords(p=>p.map(s=>{
              if(s.completions[topicId]) return s;
              const newPending = [...new Set([...(s.pending||[]), topicId])];
              return {...s, pending: newPending};
            }));
          };

          const assignAllTopicsToAll = () => {
            setStaffRecords(p=>p.map(s=>{
              const newPending = [...new Set([...(s.pending||[]), ...TOPICS.filter(t=>!s.completions[t.id]).map(t=>t.id)])];
              return {...s, pending: newPending};
            }));
          };

          return (
            <div>
              <div style={{fontFamily:"'Playfair Display',serif",fontSize:"20px",color:"#2563C0",marginBottom:"6px"}}>📋 Assign Inservices to Staff</div>
              <p style={{color:"rgba(26,58,107,.5)",fontSize:"12px",marginBottom:"20px"}}>Choose which inservices each staff member sees in their portal. Only assigned inservices appear on their screen.</p>

              {/* Bulk assign bar */}
              <div style={{background:"rgba(37,99,192,.08)",border:"1px solid rgba(37,99,192,.2)",borderRadius:"10px",padding:"16px 18px",marginBottom:"20px"}}>
                <div style={{fontSize:"12px",fontWeight:"700",color:"#2563C0",marginBottom:"10px"}}>⚡ Bulk Assign</div>
                <div style={{display:"flex",gap:"10px",flexWrap:"wrap",alignItems:"center"}}>
                  <select value={bulkTopicId} onChange={e=>setBulkTopicId(e.target.value)} style={{flex:1,minWidth:"220px",fontSize:"12px"}}>
                    <option value="">— Select an inservice —</option>
                    {TOPICS.map(t=><option key={t.id} value={t.id}>{t.icon} {t.label}{t.mandatory?" ★":""}</option>)}
                  </select>
                  <button className="btn" onClick={()=>{if(bulkTopicId){assignTopicToAll(bulkTopicId);setBulkTopicId("");}}}
                    style={{background:"rgba(39,174,96,.2)",color:"#27ae60",padding:"9px 16px",borderRadius:"7px",fontSize:"12px",border:"1px solid rgba(39,174,96,.3)",whiteSpace:"nowrap"}}>
                    Assign to All Staff
                  </button>
                  <button className="btn" onClick={assignAllTopicsToAll}
                    style={{background:"rgba(37,99,192,.15)",color:"#2563C0",padding:"9px 16px",borderRadius:"7px",fontSize:"12px",border:"1px solid rgba(37,99,192,.3)",whiteSpace:"nowrap"}}>
                    Assign ALL Topics to ALL Staff
                  </button>
                </div>
              </div>

              {/* Staff list with topic toggles */}
              <div style={{display:"flex",gap:"10px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
                <input type="text" placeholder="🔍 Search staff..." value={assignSearch} onChange={e=>setAssignSearch(e.target.value)} style={{width:"200px",fontSize:"12px"}}/>
                <select value={assignFilterStaff} onChange={e=>setAssignFilterStaff(e.target.value)} style={{fontSize:"12px"}}>
                  <option value="all">All Staff</option>
                  <option value="none">No Assignments Yet</option>
                  <option value="partial">Partially Assigned</option>
                </select>
                <span style={{marginLeft:"auto",fontSize:"11px",color:"rgba(26,58,107,.35)"}}>{staffRecords.length} staff members</span>
              </div>

              <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
                {staffRecords.filter(s=>!assignSearch||s.name.toLowerCase().includes(assignSearch.toLowerCase())).filter(s=>{
                  const tot = [...new Set([...(s.pending||[]),...Object.keys(s.completions)])].length;
                  if(assignFilterStaff==="none") return tot===0;
                  if(assignFilterStaff==="partial") return tot>0 && tot<TOPICS.length;
                  return true;
                }).map(s=>{
                  const assigned = [...new Set([...(s.pending||[]),...Object.keys(s.completions)])];
                  const pendingCount = (s.pending||[]).length;
                  const doneCount = Object.keys(s.completions).length;
                  return (
                    <div key={s.id} className="card" style={{padding:"16px 18px"}}>
                      {/* Staff header */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"12px",flexWrap:"wrap",gap:"8px"}}>
                        <div style={{display:"flex",gap:"10px",alignItems:"center"}}>
                          <div style={{width:"36px",height:"36px",borderRadius:"50%",background:"rgba(37,99,192,.15)",border:"2px solid rgba(37,99,192,.3)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px",fontWeight:"700",color:"#2563C0"}}>
                            {s.name.charAt(0)}
                          </div>
                          <div>
                            <div style={{fontWeight:"700",fontSize:"14px"}}>{s.name}</div>
                            <div style={{fontSize:"11px",color:"rgba(26,58,107,.4)"}}>{s.role} · {doneCount} completed · {pendingCount} pending</div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:"6px",alignItems:"center"}}>
                          <span className={`pill ${doneCount===assigned.length&&assigned.length>0?"pill-green":pendingCount>0?"pill-amber":"pill-gray"}`} style={{fontSize:"10px"}}>
                            {assigned.length}/{TOPICS.length} assigned
                          </span>
                          <button className="btn" onClick={()=>{
                            const newPending=[...new Set([...(s.pending||[]),...TOPICS.filter(t=>!s.completions[t.id]).map(t=>t.id)])];
                            setStaffRecords(p=>p.map(r=>r.id!==s.id?r:{...r,pending:newPending}));
                          }} style={{background:"rgba(39,174,96,.15)",color:"#27ae60",padding:"4px 10px",borderRadius:"5px",fontSize:"10px",border:"1px solid rgba(39,174,96,.3)"}}>+ All</button>
                          <button className="btn" onClick={()=>{
                            const newPending=(s.pending||[]).filter(id=>s.completions[id]);
                            setStaffRecords(p=>p.map(r=>r.id!==s.id?r:{...r,pending:newPending}));
                          }} style={{background:"rgba(231,76,60,.1)",color:"#e74c3c",padding:"4px 10px",borderRadius:"5px",fontSize:"10px",border:"1px solid rgba(231,76,60,.25)"}}>✕ Clear</button>
                        </div>
                      </div>

                      {/* Topic checkboxes — grouped by status */}
                      <div style={{display:"flex",flexWrap:"wrap",gap:"6px"}}>
                        {TOPICS.map(t=>{
                          const isDone = !!s.completions[t.id];
                          const isAssigned = assigned.includes(t.id);
                          return (
                            <div key={t.id}
                              onClick={()=>toggleStaffTopic(s.id, t.id)}
                              title={t.label + (isDone?" (completed — cannot unassign)":isAssigned?" (assigned — click to remove)":"  (click to assign)")}
                              style={{display:"flex",alignItems:"center",gap:"5px",padding:"5px 10px",borderRadius:"20px",cursor:isDone?"default":"pointer",fontSize:"11px",fontWeight:"600",transition:"all .15s",userSelect:"none",
                                background:isDone?"rgba(39,174,96,.15)":isAssigned?"rgba(37,99,192,.15)":"rgba(255,255,255,.05)",
                                border:`1px solid ${isDone?"rgba(39,174,96,.4)":isAssigned?"rgba(37,99,192,.4)":"rgba(255,255,255,.1)"}`,

                            </div>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })()}

        {/* STAFF */}

          <div>
            <div style={{display:"flex",gap:"10px",marginBottom:"14px",flexWrap:"wrap",alignItems:"center"}}>
              <input type="text" placeholder="🔍 Search..." value={search} onChange={e=>setSearch(e.target.value)} style={{width:"180px"}}/>
              <select value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="all">All Staff</option><option value="compliant">Fully Compliant</option><option value="mandatory">Missing Mandatory</option><option value="hours">Below 12 Hours</option></select>
              <button className="btn" onClick={()=>setAddingStaff(true)} style={{background:"#2563C0",color:"#1A3A6B",padding:"9px 14px",borderRadius:"7px",fontSize:"12px",marginLeft:"auto"}}>+ Add Staff</button>
            </div>
            <div style={{overflowX:"auto"}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:"11px",minWidth:"900px"}}>
                <thead>
                  <tr style={{background:"rgba(255,255,255,.06)"}}>
                    <th style={{padding:"8px 12px",textAlign:"left",whiteSpace:"nowrap",position:"sticky",left:0,background:"rgba(15,25,35,.95)",zIndex:2}}>Name / Role</th>
                    <th style={{padding:"8px 10px",textAlign:"center",whiteSpace:"nowrap"}}>Status</th>
                    <th style={{padding:"8px 10px",textAlign:"center",whiteSpace:"nowrap"}}>Hours</th>
                    <th style={{padding:"8px 10px",textAlign:"center",whiteSpace:"nowrap"}}>Done</th>
                    <th style={{padding:"8px 10px",textAlign:"center",whiteSpace:"nowrap"}}>Mandatory ✓</th>
                    <th style={{padding:"8px 6px",textAlign:"left",whiteSpace:"nowrap"}}>Completed Topics</th>
                    <th style={{padding:"8px 10px"}}></th>
                  </tr>
                </thead>
                <tbody>
                  {filteredRecords.map(s=>{
                    const hrs=totalHours(s.completions);
                    const doneTopics = TOPICS.filter(t=>s.completions[t.id]);
                    const mandatoryTopics = TOPICS.filter(t=>t.mandatory);
                    const mandatoryComplete = mandatoryTopics.filter(t=>s.completions[t.id]);
                    return(
                      <tr key={s.id} style={{borderBottom:"1px solid rgba(255,255,255,.06)"}}>
                        <td style={{padding:"10px 12px",position:"sticky",left:0,background:"rgba(15,25,35,.95)",zIndex:1}}>
                          <div style={{fontWeight:"600",fontSize:"12px"}}>{s.name}</div>
                          <div style={{fontSize:"10px",color:"rgba(26,58,107,.38)"}}>{s.role}</div>
                        </td>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><span className={`pill ${compStatus(s).cls}`}>{compStatus(s).label}</span></td>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><span className={`pill ${hrs>=REQUIRED_HOURS?"pill-green":"pill-amber"}`}>{hrs.toFixed(1)}/{REQUIRED_HOURS}</span></td>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><span className={`pill ${doneTopics.length===TOPICS.length?"pill-green":doneTopics.length>0?"pill-amber":"pill-gray"}`}>{doneTopics.length}/{TOPICS.length}</span></td>
                        <td style={{padding:"8px 10px",textAlign:"center"}}><span className={`pill ${mandatoryComplete.length===mandatoryTopics.length?"pill-green":"pill-red"}`}>{mandatoryComplete.length}/{mandatoryTopics.length}</span></td>
                        <td style={{padding:"8px 6px",maxWidth:"320px"}}>
                          <div style={{display:"flex",flexWrap:"wrap",gap:"3px"}}>
                            {doneTopics.slice(0,12).map(t=><span key={t.id} title={t.label} style={{fontSize:"14px"}}>{t.icon}</span>)}
                            {doneTopics.length>12&&<span style={{fontSize:"10px",color:"rgba(26,58,107,.4)",alignSelf:"center"}}>+{doneTopics.length-12} more</span>}
                            {doneTopics.length===0&&<span style={{fontSize:"10px",color:"rgba(26,58,107,.3)"}}>None completed</span>}
                          </div>
                        </td>
                        <td style={{padding:"8px 10px"}}><button className="btn" onClick={()=>{setSelectedStaff(s);setStaffDetailTab("progress");}} style={{background:"rgba(155,89,182,.2)",color:"#bb8fce",padding:"6px 10px",borderRadius:"5px",fontSize:"11px",border:"1px solid rgba(155,89,182,.3)"}}>View</button></td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{marginTop:"7px",fontSize:"11px",color:"rgba(26,58,107,.28)"}}>* = Federally mandated topic · {filteredRecords.length}/{staffRecords.length} shown</div>
          </div>
        )}

        {/* PENDING */}
        {adminTab==="pending" && (
          <div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:"17px",color:"#2563C0",marginBottom:"6px"}}>Pending Supervisor Sign-Offs</div>
            <p style={{color:"rgba(26,58,107,.5)",fontSize:"12px",marginBottom:"18px"}}>Staff who completed via Self sign-off, awaiting supervisor upgrade per 42 CFR §483.35.</p>
            {pendingSignoffs.length===0?(
              <div className="card" style={{padding:"36px",textAlign:"center"}}><div style={{fontSize:"38px",marginBottom:"10px"}}>✅</div><div style={{color:"rgba(26,58,107,.45)",fontSize:"13px"}}>No pending sign-offs.</div></div>
            ):(
              <div className="card" style={{overflow:"hidden"}}>
                <div className="thead" style={{gridTemplateColumns:"2fr 2fr 1fr 1fr 170px"}}><span>Staff</span><span>Topic</span><span>Score</span><span>Date</span><span>Action</span></div>

              else{const missing=staffRecords.filter(s=>!s.completions[item.id]).length;status=missing===0?"✅":"⚠️";note=missing===0?`All ${totalStaff} staff complete`:`${missing} staff incomplete`;}

  }
});

app.listen(3001);
