<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkillVia – Supervisor Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #dce8f5 0%, #e8f1fa 50%, #f0f6fc 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    color: #1A3A6B;
  }

  /* NAV BAR */
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(37,99,192,0.12);
    padding: 14px 40px;
    display: flex; align-items: center; justify-content: space-between;
    z-index: 100;
  }
  .logo {
    display: flex; align-items: center; gap: 9px;
    text-decoration: none;
  }
  .logo-icon {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #1A3A6B, #2563C0);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }
  .logo-text {
    font-size: 1.25rem; font-weight: 800;
    color: #1A3A6B;
  }
  .logo-text span { color: #2563C0; }
  .topbar-link {
    font-size: 0.82rem; font-weight: 600;
    color: #5b7fa6;
    text-decoration: none;
    transition: color 0.2s;
  }
  .topbar-link:hover { color: #2563C0; }

  /* CARD */
  .card {
    background: white;
    border-radius: 20px;
    padding: 48px 44px;
    max-width: 460px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(26,58,107,0.1), 0 1px 4px rgba(26,58,107,0.06);
    border: 1px solid rgba(37,99,192,0.08);
    margin-top: 72px;
  }

  .card-badge {
    display: inline-block;
    background: #eef4ff;
    border: 1px solid #c7d9f5;
    color: #2563C0;
    border-radius: 100px;
    padding: 4px 14px;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .card h1 {
    font-size: 1.85rem;
    font-weight: 800;
    color: #1A3A6B;
    margin-bottom: 8px;
    line-height: 1.2;
  }

  .card-sub {
    font-size: 0.9rem;
    color: #6b87aa;
    line-height: 1.6;
    margin-bottom: 32px;
  }

  /* FORM */
  .form-group { margin-bottom: 20px; }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    color: #3d5a80;
    margin-bottom: 7px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute; left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 0.95rem; pointer-events: none;
  }
  .form-group input {
    width: 100%;
    padding: 12px 14px 12px 40px;
    background: #f7fafd;
    border: 1.5px solid #d0e1f0;
    border-radius: 10px;
    font-size: 0.92rem;
    font-family: 'Inter', sans-serif;
    color: #1A3A6B;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input::placeholder { color: #a8bdd4; }
  .form-group input:focus {
    border-color: #2563C0;
    background: white;
    box-shadow: 0 0 0 3px rgba(37,99,192,0.1);
  }

  .forgot-link {
    display: block; text-align: right;
    font-size: 0.8rem; font-weight: 600;
    color: #2563C0;
    text-decoration: none;
    margin-top: -12px; margin-bottom: 22px;
    transition: color 0.2s;
  }
  .forgot-link:hover { color: #1A3A6B; }

  .error-msg {
    background: #fff5f5;
    border: 1px solid #fecaca;
    color: #dc2626;
    border-radius: 10px;
    padding: 11px 14px;
    font-size: 0.84rem;
    margin-bottom: 18px;
    display: none;
  }

  .btn-login {
    width: 100%;
    background: linear-gradient(135deg, #2563C0, #1A3A6B);
    color: white;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-weight: 700;
    font-size: 0.95rem;
    font-family: 'Inter', sans-serif;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: 0 4px 14px rgba(37,99,192,0.35);
    letter-spacing: 0.2px;
  }
  .btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 22px rgba(37,99,192,0.45); }
  .btn-login:active { transform: translateY(0); }
  .btn-login.loading { opacity: 0.7; cursor: not-allowed; transform: none !important; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0;
    color: #b8cedf; font-size: 0.8rem;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: #e2edf5;
  }

  .signup-link {
    text-align: center;
    font-size: 0.84rem;
    color: #6b87aa;
  }
  .signup-link a {
    color: #2563C0; text-decoration: none;
    font-weight: 600; transition: color 0.2s;
  }
  .signup-link a:hover { color: #1A3A6B; }

  .staff-link {
    text-align: center;
    margin-top: 28px;
    padding-top: 20px;
    border-top: 1px solid #eef3f8;
    font-size: 0.8rem;
    color: #a8bdd4;
  }
  .staff-link a {
    color: #5b7fa6; text-decoration: none;
    font-weight: 600; transition: color 0.2s;
  }
  .staff-link a:hover { color: #2563C0; }

  .spinner {
    display: inline-block; width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 500px) {
    .card { padding: 32px 22px; margin-top: 64px; }
    .topbar { padding: 12px 20px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <a href="https://www.skillviaai.com" class="logo">
    <div class="logo-icon">🛡️</div>
    <span class="logo-text">Skill<span>Via</span></span>
  </a>
  <a href="staff.html" class="topbar-link">Staff Portal →</a>
</div>

<div class="card">
  <div class="card-badge">Supervisor Portal</div>
  <h1>Welcome Back</h1>
  <p class="card-sub">Sign in to manage your facility's training and compliance.</p>

  <div class="error-msg" id="error-msg"></div>

  <div class="form-group">
    <label>Email Address</label>
    <div class="input-wrap">
      <span class="input-icon">✉️</span>
      <input type="email" id="email" placeholder="admin@yourfacility.com" autocomplete="email" />
    </div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔒</span>
      <input type="password" id="password" placeholder="Your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter') handleLogin()" />
    </div>
  </div>

  <a href="mailto:aysha@skillviaai.com?subject=Password Reset Request" class="forgot-link">Forgot password?</a>

  <div class="error-msg" id="error-msg-2"></div>

  <button class="btn-login" id="login-btn" onclick="handleLogin()">
    Sign In to Supervisor Portal →
  </button>

  <div class="divider">or</div>

  <div class="signup-link">
    New facility? <a href="signup.html">Apply for a free 14-day demo →</a>
  </div>

  <div class="staff-link">
    Are you a staff member? <a href="staff.html">Go to Staff Portal →</a>
  </div>
</div>

<script>
  /**
   * BACKEND INTEGRATION REQUIRED
   * POST /api/supervisor/login
   * Body: { email, password }
   * Success: { success: true, token: "...", redirectUrl: "/dashboard.html" }
   * Failure: { success: false, message: "..." }
   */
  async function handleLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }
    const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRe.test(email)) {
      showError('Please enter a valid email address.');
      return;
    }

    btn.classList.add('loading');
    btn.innerHTML = '<span class="spinner"></span> Signing in...';
    errorMsg.style.display = 'none';

    try {
      const response = await fetch('/api/supervisor/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await response.json();

      if (data.success) {
        localStorage.setItem('sv_token', data.token);
        localStorage.setItem('sv_role', 'supervisor');
        if (data.userName) localStorage.setItem('sv_userName', data.userName);
        window.location.href = data.redirectUrl || 'education_portal.html';
      } else {
        showError(data.message || 'Invalid email or password. Please try again.');
        btn.classList.remove('loading');
        btn.innerHTML = 'Sign In to Supervisor Portal →';
      }
    } catch (err) {
      showError('Unable to connect. Please check your connection and try again.');
      btn.classList.remove('loading');
      btn.innerHTML = 'Sign In to Supervisor Portal →';
    }
  }

  function showError(msg) {
    const el = document.getElementById('error-msg');
    el.textContent = '⚠️ ' + msg;
    el.style.display = 'block';
  }

  window.addEventListener('DOMContentLoaded', () => {
    const token = localStorage.getItem('sv_token');
    if (token) window.location.href = 'education_portal.html';
  });
</script>
</body>
</html>
